<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bollywood Word Match</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #ffe259, #ffa751);
  margin: 0;
}

h1 {
  color: #d63384;
}

.top-bar {
  display: flex;
  justify-content: space-around;
  font-size: 18px;
  margin: 10px;
}

#board {
  width: 90%;
  max-width: 500px;
  margin: auto;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.tile {
  padding: 12px;
  margin: 6px;
  min-width: 80px;
  background: white;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.tile:hover {
  transform: scale(1.05);
}

.selected {
  background: #ff4d6d;
  color: white;
}

.correct {
  background: #28a745 !important;
  color: white;
}

.wrong {
  background: #dc3545 !important;
  color: white;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #ff3399;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>🎬 Bollywood Word Match</h1>

<div class="top-bar">
  <div>⭐ Score: <span id="score">0</span></div>
  <div>⏱️ Time: <span id="timer">60</span></div>
  <div>🎮 Level: <span id="level">1</span></div>
</div>

<div id="board"></div>

<button onclick="startGame()">Restart</button>

<script>

// 🔥 SAMPLE MOVIES (replace with API later)
let movieList = [
  "Kabhi Khushi Kabhie Gham",
  "Dil Wale Dulhania Le Jayenge",
  "Kuch Kuch Hota Hai",
  "Kal Ho Naa Ho",
  "Hum Aapke Hain Koun",
  "Zindagi Na Milegi Dobara",
  "Chennai Express"
];

let level = 1;
let score = 0;
let timer = 60;
let interval;

let movies = [];
let words = [];
let selected = [];

// 🔊 Sound
const correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// 🎮 Start Game
function startGame() {
  clearInterval(interval);

  score = 0;
  timer = 60;
  level = 1;

  updateUI();
  loadLevel();

  interval = setInterval(() => {
    timer--;
    document.getElementById("timer").innerText = timer;

    if (timer <= 0) {
      clearInterval(interval);
      alert("⏰ Game Over! Score: " + score);
    }
  }, 1000);
}

// 📦 Load Level
function loadLevel() {
  selected = [];

  let count = level + 2; // more movies each level
  let chosen = shuffle(movieList).slice(0, count);

  movies = chosen.map(m => m.split(" "));
  words = movies.flat();

  words = shuffle(words);

  renderBoard();
}

// 🎲 Shuffle
function shuffle(arr) {
  return arr.sort(() => 0.5 - Math.random());
}

// 🎨 Render
function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  words.forEach(word => {
    let div = document.createElement("div");
    div.className = "tile";
    div.innerText = word;

    div.onclick = () => handleClick(div, word);

    board.appendChild(div);
  });
}

// 🖱️ Click Logic
function handleClick(tile, word) {
  tile.classList.toggle("selected");

  if (selected.includes(word)) {
    selected = selected.filter(w => w !== word);
  } else {
    selected.push(word);
  }

  if (selected.length === 3) checkMatch();
}

// ✅ Check Match
function checkMatch() {
  let tiles = document.querySelectorAll(".selected");

  let matched = movies.some(movie =>
    selected.every(w => movie.includes(w))
  );

  if (matched) {
    tiles.forEach(t => t.classList.add("correct"));
    correctSound.play();
    score += 20;

    setTimeout(() => {
      tiles.forEach(t => t.remove());
      nextStep();
    }, 500);

  } else {
    tiles.forEach(t => t.classList.add("wrong"));
    wrongSound.play();

    setTimeout(() => {
      tiles.forEach(t => t.classList.remove("wrong", "selected"));
    }, 500);
  }

  selected = [];
  updateUI();
}

// 🔄 Next Step / Level
function nextStep() {
  if (document.querySelectorAll(".tile").length <= 3) {
    level++;
    timer += 10;
    loadLevel();
  }
}

// 🔄 UI Update
function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;
  document.getElementById("timer").innerText = timer;
}

// 🚀 Start on load
startGame();

</script>

</body>
</html>
