<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Snakes & Ladders 3D Ultra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Rajdhani:wght@500;700&family=Orbitron:wght@700;900&display=swap');

:root {
  --mango-light: #FFC324;
  --mango-dark: #FF8243;
  --neon-blue: #00f5ff;
  --neon-pink: #ff00ff;
  --neon-yellow: #ccff00;
  --neon-green: #00ff88;
  --bg-dark: #0a0e1a;
  --cell-light: #1e2a42;
  --cell-dark: #141c2e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,0,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255,195,36,0.1) 0%, transparent 50%);
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  animation: bgShift 20s ease-in-out infinite;
}

@keyframes bgShift {
  0%, 100% { filter: hue-rotate(0deg); }
  50% { filter: hue-rotate(30deg); }
}

/* Animated aurora background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: 
    linear-gradient(45deg, transparent 30%, rgba(0,245,255,0.03) 50%, transparent 70%),
    linear-gradient(-45deg, transparent 30%, rgba(255,0,255,0.03) 50%, transparent 70%);
  animation: aurora 15s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes aurora {
  0%, 100% { transform: translateX(-10%) skewX(0deg); }
  50% { transform: translateX(10%) skewX(5deg); }
}

header {
  background: linear-gradient(135deg, var(--mango-light), var(--neon-pink), var(--mango-dark));
  background-size: 200% 200%;
  animation: gradientShift 3s ease infinite;
  color: #000;
  text-align: center;
  padding: 12px 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  box-shadow: 0 4px 30px rgba(255,130,67,0.6), 0 0 60px rgba(255,0,255,0.3);
  z-index: 100;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.8);
  position: relative;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

footer {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--mango-light));
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
  color: #000;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
}

#main-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding: 12px;
  gap: 14px;
  position: relative;
  z-index: 1;
}

/* ── SIDE PANEL ── */
#side-panel {
  width: 240px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.6);
  border: 2px solid;
  border-image: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--mango-light)) 1;
  box-shadow: 0 0 30px rgba(0,245,255,0.25), inset 0 0 30px rgba(255,0,255,0.08);
  border-radius: 16px;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  backdrop-filter: blur(16px);
  animation: panelGlow 3s ease-in-out infinite;
}

@keyframes panelGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(0,245,255,0.25), inset 0 0 30px rgba(255,0,255,0.08); }
  50% { box-shadow: 0 0 40px rgba(255,0,255,0.3), inset 0 0 40px rgba(0,245,255,0.1); }
}

.panel-section { text-align: center; }
.panel-label {
  color: var(--neon-blue);
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 3px;
  font-size: 13px;
  margin-bottom: 8px;
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--neon-blue);
}

select {
  width: 100%;
  padding: 10px 12px;
  background: rgba(0,0,0,0.8);
  color: var(--neon-yellow);
  border: 2px solid var(--neon-pink);
  border-radius: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  outline: none;
  box-shadow: 0 0 15px rgba(255,0,255,0.2);
  transition: all 0.3s;
}
select:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0,245,255,0.4);
}

/* ── SCORE & INFO ── */
.info-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  padding: 4px 0;
}
.info-val {
  color: var(--neon-yellow);
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  text-shadow: 0 0 10px var(--neon-yellow);
}

/* ── 3D DICE ── */
#dice-scene {
  perspective: 300px;
  width: 90px;
  height: 90px;
  margin: 0 auto 10px;
  cursor: pointer;
  filter: drop-shadow(0 0 20px rgba(0,245,255,0.5));
}
#dice-cube {
  width: 90px;
  height: 90px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(-25deg) rotateY(20deg);
  transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#dice-cube.rolling {
  animation: diceRoll 0.8s ease-in-out;
}
@keyframes diceRoll {
  0%   { transform: rotateX(-25deg) rotateY(20deg) rotateZ(0deg); }
  20%  { transform: rotateX(180deg) rotateY(120deg) rotateZ(90deg); }
  40%  { transform: rotateX(360deg) rotateY(240deg) rotateZ(180deg); }
  60%  { transform: rotateX(540deg) rotateY(360deg) rotateZ(270deg); }
  80%  { transform: rotateX(680deg) rotateY(480deg) rotateZ(315deg); }
  100% { transform: var(--final-transform); }
}
.dice-face {
  position: absolute;
  width: 90px;
  height: 90px;
  background: linear-gradient(145deg, #ffffff, #e0e0e0);
  border-radius: 16px;
  display: grid;
  padding: 12px;
  gap: 5px;
  border: 3px solid #ddd;
  box-shadow: 
    inset 0 0 15px rgba(0,0,0,0.1),
    inset 0 0 30px rgba(255,255,255,0.8),
    0 0 20px rgba(0,245,255,0.3);
}
.dice-face.f1 { transform: translateZ(45px); }
.dice-face.f2 { transform: rotateY(180deg) translateZ(45px); }
.dice-face.f3 { transform: rotateY(90deg)  translateZ(45px); }
.dice-face.f4 { transform: rotateY(-90deg) translateZ(45px); }
.dice-face.f5 { transform: rotateX(90deg)  translateZ(45px); }
.dice-face.f6 { transform: rotateX(-90deg) translateZ(45px); }

.dot {
  width: 14px; height: 14px;
  background: radial-gradient(circle at 30% 30%, #333, #000);
  border-radius: 50%;
  box-shadow: 
    2px 2px 4px rgba(0,0,0,0.4),
    inset 1px 1px 2px rgba(255,255,255,0.2);
}
/* 1-pip layout */
.face-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; place-items: center; }
/* 2-pip layout */
.face-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.face-2 .dot:nth-child(1) { grid-column:1; grid-row:1; align-self:start; justify-self:start; }
.face-2 .dot:nth-child(2) { grid-column:2; grid-row:2; align-self:end; justify-self:end; }
/* 3-pip layout */
.face-3 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
.face-3 .dot:nth-child(1) { grid-column:1; grid-row:1; }
.face-3 .dot:nth-child(2) { grid-column:2; grid-row:2; place-self:center; }
.face-3 .dot:nth-child(3) { grid-column:3; grid-row:3; align-self:end; justify-self:end; }
/* 4-pip layout */
.face-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
/* 5-pip layout */
.face-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
.face-5 .dot:nth-child(1) { grid-column:1; grid-row:1; }
.face-5 .dot:nth-child(2) { grid-column:3; grid-row:1; }
.face-5 .dot:nth-child(3) { grid-column:2; grid-row:2; place-self:center; }
.face-5 .dot:nth-child(4) { grid-column:1; grid-row:3; }
.face-5 .dot:nth-child(5) { grid-column:3; grid-row:3; }
/* 6-pip layout */
.face-6 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }

/* Dice face rainbow tints */
.dice-face.f1 { background: linear-gradient(145deg, #fff, #ffe0e0); }
.dice-face.f2 { background: linear-gradient(145deg, #fff, #e0ffe0); }
.dice-face.f3 { background: linear-gradient(145deg, #fff, #e0e0ff); }
.dice-face.f4 { background: linear-gradient(145deg, #fff, #ffe0ff); }
.dice-face.f5 { background: linear-gradient(145deg, #fff, #ffffe0); }
.dice-face.f6 { background: linear-gradient(145deg, #fff, #e0ffff); }

#message {
  color: var(--neon-yellow);
  font-weight: 700;
  font-size: 16px;
  min-height: 40px;
  line-height: 1.3;
  font-family: 'Rajdhani', sans-serif;
  text-shadow: 0 0 15px var(--neon-yellow);
  animation: msgPulse 2s ease-in-out infinite;
}

@keyframes msgPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.btn {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
  color: #fff;
  border: none;
  padding: 12px 20px;
  border-radius: 50px;
  font-size: 17px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  cursor: pointer;
  width: 100%;
  box-shadow: 
    0 4px 25px rgba(0,245,255,0.5), 
    0 0 40px rgba(255,0,255,0.3),
    0 2px 0 rgba(255,255,255,0.2) inset;
  transition: transform 0.1s, filter 0.2s, box-shadow 0.2s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%; width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(45deg);
  animation: btnShine 3s infinite;
}
@keyframes btnShine {
  0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
  100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}
.btn:hover { 
  filter: brightness(1.3); 
  transform: translateY(-3px) scale(1.02);
  box-shadow: 
    0 6px 30px rgba(0,245,255,0.7), 
    0 0 60px rgba(255,0,255,0.5);
}
.btn:active { 
  transform: translateY(2px) scale(0.98); 
  box-shadow: 0 2px 10px rgba(0,245,255,0.3); 
}
.btn:disabled { 
  background: #2a3040; 
  color: #5a6080; 
  cursor: not-allowed; 
  box-shadow: none; 
  transform: none; 
}
.btn:disabled::before { display: none; }

.btn-new {
  background: linear-gradient(135deg, var(--mango-light), var(--neon-green));
  color: #000;
  box-shadow: 0 4px 25px rgba(255,195,36,0.5), 0 0 40px rgba(0,255,136,0.3);
  font-size: 14px;
  padding: 10px;
}

/* ── BOARD AREA ── */
#board-scene {
  flex: 1;
  perspective: 1200px;
  perspective-origin: 50% 0%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

#board-tilt {
  transform-style: preserve-3d;
  transform: rotateX(22deg) rotateZ(0deg);
  position: relative;
  width: min(85vh, 85%);
  aspect-ratio: 1 / 1;
  flex-shrink: 0;
  animation: boardFloat 6s ease-in-out infinite;
}

@keyframes boardFloat {
  0%, 100% { transform: rotateX(22deg) rotateZ(0deg) translateY(0px); }
  50% { transform: rotateX(20deg) rotateZ(0deg) translateY(-8px); }
}

#board-surface {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0f1628, #1a2340);
  border-radius: 12px;
  border: 4px solid;
  border-image: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--mango-light)) 1;
  box-shadow:
    0 0 0 1px rgba(0,245,255,0.4),
    0 40px 80px rgba(0,0,0,0.9),
    0 0 60px rgba(0,245,255,0.2),
    0 0 100px rgba(255,0,255,0.1);
  position: relative;
  transform-style: preserve-3d;
}

/* Board side faces for true 3D thickness */
#board-left {
  position: absolute;
  top: 0; left: -12px;
  width: 12px; height: 100%;
  background: linear-gradient(to right, #050a18, #0a1428, #1a2340);
  border-radius: 3px 0 0 3px;
  transform: rotateY(-90deg);
  transform-origin: right center;
  border-top: 4px solid rgba(0,245,255,0.3);
  border-bottom: 4px solid rgba(0,245,255,0.3);
}
#board-bottom {
  position: absolute;
  bottom: -12px; left: 0;
  width: 100%; height: 12px;
  background: linear-gradient(to bottom, #0a1428, #050a18);
  border-radius: 0 0 3px 3px;
  transform: rotateX(-90deg);
  transform-origin: top center;
  border-left: 4px solid rgba(0,245,255,0.3);
  border-right: 4px solid rgba(0,245,255,0.3);
}

#board {
  display: grid;
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}

/* ── CELLS ── */
.cell {
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 4px 5px;
  font-size: clamp(7px, 0.9vw, 13px);
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  color: rgba(255,255,255,0.3);
  position: relative;
  background: var(--cell-dark);
  transition: all 0.3s;
}
.cell:nth-child(even) { background: var(--cell-light); }
.cell:hover {
  background: rgba(0,245,255,0.1) !important;
  box-shadow: inset 0 0 20px rgba(0,245,255,0.2);
  z-index: 5;
}
.cell.start-cell {
  background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(0,245,255,0.05)) !important;
  color: var(--neon-blue);
  box-shadow: inset 0 0 15px rgba(0,245,255,0.3);
  animation: startPulse 2s ease-in-out infinite;
}
@keyframes startPulse {
  0%, 100% { box-shadow: inset 0 0 15px rgba(0,245,255,0.3); }
  50% { box-shadow: inset 0 0 25px rgba(0,245,255,0.5); }
}
.cell.end-cell {
  background: linear-gradient(135deg, rgba(255,195,36,0.2), rgba(255,130,67,0.1)) !important;
  color: var(--mango-light);
  box-shadow: inset 0 0 20px rgba(255,195,36,0.4);
  animation: endPulse 2s ease-in-out infinite;
}
@keyframes endPulse {
  0%, 100% { 
    box-shadow: inset 0 0 20px rgba(255,195,36,0.4);
    transform: scale(1);
  }
  50% { 
    box-shadow: inset 0 0 35px rgba(255,195,36,0.7);
    transform: scale(1.05);
  }
}
.cell.highlight {
  background: rgba(204,255,0,0.2) !important;
  animation: highlightFlash 0.5s ease;
}
@keyframes highlightFlash {
  0%, 100% { background: rgba(204,255,0,0.2) !important; }
  50% { background: rgba(204,255,0,0.4) !important; }
}

/* ── SVG OVERLAY ── */
#svg-layer {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* ── 3D PLAYER TOKEN ── */
#player-scene {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  z-index: 50;
  pointer-events: none;
  perspective: 300px;
  transform-style: preserve-3d;
}
#player {
  width: 32px;
  height: 32px;
  position: absolute;
  transform-style: preserve-3d;
  transform: translate(-16px, -32px);
  transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
              top  0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.9));
}
.token-shadow {
  position: absolute;
  width: 32px; height: 10px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.7) 0%, transparent 70%);
  bottom: -8px; left: 0;
  border-radius: 50%;
  animation: shadowPulse 1.2s ease-in-out infinite;
}
@keyframes shadowPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(0.8); opacity: 0.5; }
}
.token-body {
  width: 32px; height: 32px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  background: radial-gradient(circle at 35% 25%,
    #ff80c0 0%,
    #ff2080 35%,
    #ff0080 60%,
    #8b0040 85%,
    #3a0018 100%
  );
  box-shadow:
    inset -5px -6px 10px rgba(0,0,0,0.6),
    inset 4px 4px 8px rgba(255,255,255,0.5),
    0 0 0 3px rgba(255,255,255,0.7),
    0 0 20px rgba(255,32,128,0.8);
  position: absolute;
  top: 0; left: 0;
  animation: tokenBob 1.2s ease-in-out infinite, tokenGlow 2s ease-in-out infinite;
}
@keyframes tokenGlow {
  0%, 100% { box-shadow: inset -5px -6px 10px rgba(0,0,0,0.6), inset 4px 4px 8px rgba(255,255,255,0.5), 0 0 0 3px rgba(255,255,255,0.7), 0 0 20px rgba(255,32,128,0.8); }
  50% { box-shadow: inset -5px -6px 10px rgba(0,0,0,0.6), inset 4px 4px 8px rgba(255,255,255,0.5), 0 0 0 3px rgba(255,255,255,0.7), 0 0 35px rgba(255,32,128,1); }
}
.token-highlight {
  position: absolute;
  width: 12px; height: 9px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.9) 0%, transparent 100%);
  top: 5px; left: 6px;
  border-radius: 50%;
  pointer-events: none;
}
.token-pin {
  position: absolute;
  width: 5px;
  height: 18px;
  background: linear-gradient(to bottom, #eee, #666, #333);
  bottom: -16px;
  left: 13.5px;
  border-radius: 2px;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.6);
}
@keyframes tokenBob {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
}

/* Token trail effect */
.token-trail {
  position: absolute;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,32,128,0.4), transparent);
  pointer-events: none;
  animation: trailFade 0.6s ease-out forwards;
}
@keyframes trailFade {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(2); opacity: 0; }
}

/* ── MOVE ANIMATION ── */
@keyframes tokenJump {
  0%   { transform: translateY(0px) scale(1) rotateZ(0deg); }
  40%  { transform: translateY(-25px) scale(1.15) rotateZ(10deg); }
  100% { transform: translateY(0px) scale(1) rotateZ(0deg); }
}
#player.jumping .token-body { animation: tokenJump 0.35s ease-out; }

/* ── SNAKE TUBE STYLE ── */
.snake-body {
  fill: none;
  stroke-linecap: round;
  filter: url(#glow);
}
.ladder-rail { 
  stroke: #c8a060; 
  stroke-width: 6; 
  stroke-linecap: round;
  filter: url(#shadow);
}
.ladder-step { 
  stroke: #e8c898; 
  stroke-width: 4; 
  stroke-linecap: round; 
}
.ladder-shadow { 
  stroke: rgba(0,0,0,0.5); 
  stroke-width: 10; 
  stroke-linecap: round; 
  fill: none; 
}

/* ── PARTICLE EFFECTS ── */
.particle {
  position: absolute;
  pointer-events: none;
  z-index: 100;
  border-radius: 50%;
  animation: particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

/* Screen shake */
@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-5px, -5px); }
  20% { transform: translate(5px, -5px); }
  30% { transform: translate(-5px, 5px); }
  40% { transform: translate(5px, 5px); }
  50% { transform: translate(-5px, -5px); }
  60% { transform: translate(5px, -5px); }
  70% { transform: translate(-5px, 5px); }
  80% { transform: translate(5px, 5px); }
  90% { transform: translate(-5px, -5px); }
}
.shake { animation: shake 0.5s ease; }

</style>
</head>
<body>

<header>🐍 Snakes &amp; Ladders — ULTRA 3D 🎲</header>

<div id="main-container">
  <div id="side-panel">
    <div class="panel-section">
      <div class="panel-label">Level</div>
      <select id="levelSelect" onchange="changeLevel()">
        <option value="1">Level 1 · 1→50</option>
        <option value="2">Level 2 · 1→100</option>
        <option value="3">Level 3 · 1→150</option>
        <option value="4">Level 4 · 1→200</option>
        <option value="5">Level 5 · 1→250</option>
      </select>
    </div>

    <div class="panel-section">
      <div class="panel-label">Stats</div>
      <div class="info-row"><span>Position</span><span class="info-val" id="statPos">1</span></div>
      <div class="info-row" style="margin-top:4px"><span>Rolls</span><span class="info-val" id="statRolls">0</span></div>
      <div class="info-row" style="margin-top:4px"><span>Snakes</span><span class="info-val" id="statSnakes">0</span></div>
      <div class="info-row" style="margin-top:4px"><span>Ladders</span><span class="info-val" id="statLadders">0</span></div>
    </div>

    <div class="panel-section" style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:10px;">
      <div id="dice-scene">
        <div id="dice-cube">
          <div class="dice-face f1 face-1"><div class="dot"></div></div>
          <div class="dice-face f2 face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f3 face-2"><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f4 face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f5 face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f6 face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      </div>
      <div id="message">Ready to roll!</div>
    </div>

    <div class="panel-section" style="display:flex; flex-direction:column; gap:8px;">
      <button id="rollBtn" class="btn" onclick="playTurn()">🎲 Roll Dice</button>
      <button class="btn btn-new" onclick="changeLevel()">↺ New Game</button>
    </div>
  </div>

  <div id="board-scene">
    <div id="board-tilt">
      <div id="board-surface">
        <div id="board-left"></div>
        <div id="board-bottom"></div>
        <div id="board"></div>
        <svg id="svg-layer"></svg>
        <div id="player-scene">
          <div id="player">
            <div class="token-body"></div>
            <div class="token-highlight"></div>
            <div class="token-pin"></div>
            <div class="token-shadow"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>Snakes &amp; Ladders 3D Ultra · Neon Edition</footer>

<script>
const levels = {
  1: { max: 50,  rows: 5  },
  2: { max: 100, rows: 10 },
  3: { max: 150, rows: 15 },
  4: { max: 200, rows: 20 },
  5: { max: 250, rows: 25 }
};

const diceTransforms = {
  1: 'rotateX(0deg) rotateY(0deg)',
  2: 'rotateX(0deg) rotateY(-90deg)',
  3: 'rotateX(-90deg) rotateY(0deg)',
  4: 'rotateX(90deg) rotateY(0deg)',
  5: 'rotateX(0deg) rotateY(90deg)',
  6: 'rotateX(0deg) rotateY(180deg)'
};

let currentLevel = 1;
let currentPos = 1;
let maxPos = 50;
let isAnimating = false;
let boardMap = {};
let jumps = {};
let rolls = 0, snakes = 0, ladders = 0;

const AC = window.AudioContext || window.webkitAudioContext;
let actx;

function playTone(freq, type, duration, vol=0.08) {
  try {
    if (!actx) actx = new AC();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + duration);
  } catch(e) { console.log('Audio requires user interaction first.'); }
}

function updateStats() {
  document.getElementById('statPos').innerText = currentPos;
  document.getElementById('statRolls').innerText = rolls;
  document.getElementById('statSnakes').innerText = snakes;
  document.getElementById('statLadders').innerText = ladders;
}

function generateJumps() {
  jumps = {};
  const numJumps = Math.floor(maxPos / 6); // Balanced number of snakes/ladders
  
  for(let i = 0; i < numJumps; i++) {
    // Generate Ladder (Up)
    let startL = Math.floor(Math.random() * (maxPos - 10)) + 2;
    let endL = startL + Math.floor(Math.random() * 20) + 10;
    if (endL < maxPos && !jumps[startL] && !Object.values(jumps).includes(startL)) {
      jumps[startL] = endL;
    }

    // Generate Snake (Down)
    let endS = Math.floor(Math.random() * (maxPos - 20)) + 2;
    let startS = endS + Math.floor(Math.random() * 20) + 10;
    if (startS < maxPos && !jumps[startS] && !Object.values(jumps).includes(startS)) {
      jumps[startS] = endS;
    }
  }
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const cols = 10;
  const rows = levels[currentLevel].rows;
  
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  let cellNum = maxPos;
  for(let r = 0; r < rows; r++) {
    let rowCells = [];
    for(let c = 0; c < cols; c++) {
      rowCells.push(cellNum--);
    }
    
    // Zig-zag pattern: if the row from the bottom is even, it flows Left-to-Right
    let rowFromBottom = rows - 1 - r;
    if (rowFromBottom % 2 === 0) {
      rowCells.reverse(); 
    }
    
    rowCells.forEach(num => {
      let div = document.createElement('div');
      div.className = 'cell';
      if(num === 1) div.classList.add('start-cell');
      if(num === maxPos) div.classList.add('end-cell');
      div.innerText = num;
      div.id = 'cell-' + num;
      board.appendChild(div);
    });
  }
}

function getCenter(pos) {
  const cell = document.getElementById('cell-' + pos);
  if(!cell) return null;
  const rect = cell.getBoundingClientRect();
  const boardRect = document.getElementById('board').getBoundingClientRect();
  return {
    x: rect.left - boardRect.left + rect.width / 2,
    y: rect.top - boardRect.top + rect.height / 2
  };
}

function drawSVG() {
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = `
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="2" dy="5" stdDeviation="3" flood-color="#000" flood-opacity="0.7"/>
      </filter>
    </defs>
  `;

  for(let start in jumps) {
    let end = jumps[start];
    let isLadder = end > start;
    let c1 = getCenter(start);
    let c2 = getCenter(end);
    if(!c1 || !c2) continue;

    if(isLadder) {
      // Draw Ladder
      let dx = c2.x - c1.x;
      let dy = c2.y - c1.y;
      let angle = Math.atan2(dy, dx);
      let dist = Math.sqrt(dx*dx + dy*dy);
      let offsetX = Math.cos(angle + Math.PI/2) * 8;
      let offsetY = Math.sin(angle + Math.PI/2) * 8;

      svg.innerHTML += `<line x1="${c1.x-offsetX}" y1="${c1.y-offsetY}" x2="${c2.x-offsetX}" y2="${c2.y-offsetY}" class="ladder-rail"/>`;
      svg.innerHTML += `<line x1="${c1.x+offsetX}" y1="${c1.y+offsetY}" x2="${c2.x+offsetX}" y2="${c2.y+offsetY}" class="ladder-rail"/>`;

      let steps = Math.floor(dist / 15);
      for(let i=1; i<=steps; i++) {
        let px = c1.x + (dx * i / (steps+1));
        let py = c1.y + (dy * i / (steps+1));
        svg.innerHTML += `<line x1="${px-offsetX}" y1="${py-offsetY}" x2="${px+offsetX}" y2="${py+offsetY}" class="ladder-step"/>`;
      }
    } else {
      // Draw Snake (Bezier Curve)
      let midX = (c1.x + c2.x)/2 + (Math.random()*80 - 40);
      let midY = (c1.y + c2.y)/2 + (Math.random()*80 - 40);
      
      // Shadow layer
      svg.innerHTML += `<path d="M ${c1.x} ${c1.y} Q ${midX} ${midY} ${c2.x} ${c2.y}" stroke="rgba(0,0,0,0.5)" stroke-width="12" fill="none" transform="translate(2, 5)" />`;
      // Body
      svg.innerHTML += `<path d="M ${c1.x} ${c1.y} Q ${midX} ${midY} ${c2.x} ${c2.y}" stroke="var(--neon-green)" stroke-width="8" class="snake-body" />`;
      // Head
      svg.innerHTML += `<circle cx="${c1.x}" cy="${c1.y}" r="7" fill="var(--neon-pink)" filter="url(#glow)"/>`;
      svg.innerHTML += `<circle cx="${c1.x-3}" cy="${c1.y-2}" r="1.5" fill="#fff"/>`;
      svg.innerHTML += `<circle cx="${c1.x+3}" cy="${c1.y-2}" r="1.5" fill="#fff"/>`;
    }
  }
}

function updatePlayerPos() {
  const coords = getCenter(currentPos);
  if (!coords) return null;
  const player = document.getElementById('player');
  player.style.left = coords.x + 'px';
  player.style.top = coords.y + 'px';
  return coords;
}

function spawnParticles(x, y, type) {
  const board = document.getElementById('board-surface');
  const colors = type === 'ladder' ? ['#ff00ff', '#00f5ff', '#ccff00', '#fff'] : ['#00ff88', '#000', '#33ff33', '#ccff00'];
  
  for(let i=0; i<20; i++) {
    let p = document.createElement('div');
    p.className = 'particle';
    p.style.width = Math.random() * 8 + 4 + 'px';
    p.style.height = p.style.width;
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.boxShadow = `0 0 10px ${p.style.background}`;
    
    let tx = (Math.random() - 0.5) * 150;
    let ty = (Math.random() - 0.5) * 150;
    p.style.setProperty('--tx', `${tx}px`);
    p.style.setProperty('--ty', `${ty}px`);
    
    board.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function changeLevel() {
  if (isAnimating) return;
  currentLevel = parseInt(document.getElementById('levelSelect').value);
  maxPos = levels[currentLevel].max;
  currentPos = 1;
  rolls = 0; snakes = 0; ladders = 0;
  
  updateStats();
  document.getElementById('message').innerText = "Board generated. Ready to roll!";
  document.getElementById('rollBtn').disabled = false;
  
  renderBoard();
  generateJumps();
  
  // Need slight delay for DOM to render grid before calculating centers
  setTimeout(() => { 
    updatePlayerPos(); 
    drawSVG(); 
  }, 50);
}

async function playTurn() {
  if(isAnimating) return;
  isAnimating = true;
  document.getElementById('rollBtn').disabled = true;

  // Initialize audio context cleanly on first user interaction
  if (!actx) actx = new AC();

  // Roll Dice
  playTone(400, 'square', 0.1);
  let diceVal = Math.floor(Math.random() * 6) + 1;
  rolls++;
  updateStats();

  const cube = document.getElementById('dice-cube');
  cube.classList.remove('rolling');
  void cube.offsetWidth; // Trigger reflow
  cube.style.setProperty('--final-transform', diceTransforms[diceVal]);
  cube.classList.add('rolling');

  document.getElementById('message').innerText = `Rolling...`;

  await new Promise(r => setTimeout(r, 800));
  playTone(600, 'sine', 0.2);
  document.getElementById('message').innerText = `Rolled a ${diceVal}!`;

  // Move Player
  for(let i=0; i<diceVal; i++) {
    if(currentPos >= maxPos) break;
    currentPos++;
    playTone(300 + (i*50), 'triangle', 0.1);
    
    const player = document.getElementById('player');
    player.classList.add('jumping');
    
    // Highlight active cell
    const cell = document.getElementById('cell-' + currentPos);
    cell.classList.add('highlight');
    setTimeout(() => cell.classList.remove('highlight'), 500);

    let coords = updatePlayerPos();
    
    // Create Trail FX
    let trail = document.createElement('div');
    trail.className = 'token-trail';
    trail.style.left = (coords.x - 16) + 'px';
    trail.style.top = (coords.y - 16) + 'px';
    document.getElementById('player-scene').appendChild(trail);
    setTimeout(() => trail.remove(), 600);

    await new Promise(r => setTimeout(r, 350));
    player.classList.remove('jumping');
  }

  updateStats();

  // Win State
  if(currentPos === maxPos) {
    document.getElementById('message').innerText = `🎉 YOU BEAT LEVEL ${currentLevel}! 🎉`;
    playTone(500, 'sine', 0.2); 
    setTimeout(()=>playTone(600, 'sine', 0.2), 200); 
    setTimeout(()=>playTone(800, 'sine', 0.4), 400);
    let coords = updatePlayerPos();
    spawnParticles(coords.x, coords.y, 'ladder');
    isAnimating = false;
    return;
  }

  // Check for Snakes & Ladders
  if(jumps[currentPos]) {
    let end = jumps[currentPos];
    let isLadder = end > currentPos;
    await new Promise(r => setTimeout(r, 400));

    if(isLadder) {
      ladders++;
      document.getElementById('message').innerText = `🪜 MEGA JUMP up to ${end}!`;
      playTone(800, 'sine', 0.5, 0.15);
      let coords = getCenter(currentPos);
      spawnParticles(coords.x, coords.y, 'ladder');
    } else {
      snakes++;
      document.getElementById('message').innerText = `🐍 POISON! Slid down to ${end}`;
      playTone(150, 'sawtooth', 0.7, 0.2);
      
      // Screen shake FX
      let boardTilt = document.getElementById('board-tilt');
      boardTilt.classList.add('shake');
      setTimeout(() => boardTilt.classList.remove('shake'), 500);
      
      let coords = getCenter(currentPos);
      spawnParticles(coords.x, coords.y, 'snake');
    }

    currentPos = end;
    updatePlayerPos();
    updateStats();
  }

  isAnimating = false;
  document.getElementById('rollBtn').disabled = false;
}

// Event Listeners
window.addEventListener('resize', () => {
  updatePlayerPos();
  drawSVG();
});

document.getElementById('dice-scene').addEventListener('click', () => {
  if (!isAnimating && !document.getElementById('rollBtn').disabled) playTurn();
});

// Initialize first game on load
window.onload = changeLevel;

</script>
</body>
</html>
