<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Snake & Ladder Party!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 20%, #ffecd2 40%, #a1c4fd 60%, #c2e9fb 80%, #d4fc79 100%);
    background-size: 400% 400%;
    animation: bgShift 8s ease infinite;
    min-height: 100vh;
    overflow-x: hidden;
  }
  @keyframes bgShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

  h1 {
    font-family: 'Fredoka One', cursive;
    text-align: center;
    font-size: 2.8rem;
    color: #fff;
    text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 rgba(0,0,0,0.1);
    padding: 1rem 0 0.5rem;
    letter-spacing: 2px;
  }

  .main-layout {
    display: flex;
    gap: 18px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 12px 24px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ---- BOARD ---- */
  .board-wrap {
    position: relative;
    flex: 0 0 auto;
    width: 540px;
    height: 540px;
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25), inset 0 0 0 4px rgba(255,255,255,0.6);
    overflow: hidden;
    background: #fffde7;
  }
  .board-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    grid-template-rows: repeat(10, 1fr);
    width: 100%; height: 100%;
    position: absolute; top:0; left:0; z-index:1;
  }
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(0,0,0,0.06);
    position: relative;
    cursor: default;
    font-size: 10px;
    font-weight: 700;
    color: rgba(0,0,0,0.35);
    transition: transform 0.15s;
    user-select: none;
  }
  .cell-num {
    position: absolute; top: 2px; left: 4px;
    font-size: 9px;
    font-weight: 800;
    color: rgba(0,0,0,0.3);
    z-index: 3;
  }
  .cell-players {
    display: flex; flex-wrap: wrap; gap: 1px;
    align-items: center; justify-content: center;
    z-index: 5;
    pointer-events: none;
  }
  .player-token {
    font-size: 18px;
    line-height: 1;
    transition: all 0.3s;
    filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.3));
  }
  .player-token.active-turn {
    animation: bounce 0.6s infinite alternate;
  }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-4px)} }

  /* snake/ladder overlay canvas */
  #overlay {
    position: absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events: none;
    z-index: 2;
  }

  /* ---- SIDE PANEL ---- */
  .panel {
    flex: 0 0 260px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .card h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: #ff6b6b;
    margin-bottom: 10px;
  }

  /* Character select */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .char-btn {
    background: #f0f0f0;
    border: 3px solid transparent;
    border-radius: 12px;
    font-size: 1.6rem;
    padding: 6px 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .char-btn:hover { transform: scale(1.15); background: #ffe0e0; }
  .char-btn.selected { border-color: #ff6b6b; background: #ffe0e0; transform: scale(1.1); }
  .char-label {
    font-size: 9px;
    color: #888;
    display: block;
    font-weight: 700;
  }

  /* Player info */
  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 12px;
    margin-bottom: 6px;
    background: #f7f7f7;
    transition: all 0.3s;
    border: 2px solid transparent;
  }
  .player-row.current-turn {
    border-color: #ffd93d;
    background: #fffde7;
    box-shadow: 0 0 0 3px rgba(255,217,61,0.3);
  }
  .player-row .emoji { font-size: 1.6rem; }
  .player-row .pname { font-weight: 800; font-size: 0.9rem; color: #333; }
  .player-row .pscore { font-size: 0.8rem; color: #888; }
  .turn-badge {
    margin-left: auto;
    font-size: 0.75rem;
    background: #ffd93d;
    color: #7c5800;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 800;
    display: none;
  }
  .player-row.current-turn .turn-badge { display: block; }

  /* Dice */
  .dice-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #dice-display {
    font-size: 5rem;
    line-height: 1;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
    transition: transform 0.1s;
    cursor: pointer;
  }
  #dice-display.rolling {
    animation: diceRoll 0.5s ease;
  }
  @keyframes diceRoll {
    0%{transform:rotate(0) scale(1)} 25%{transform:rotate(15deg) scale(1.2)}
    50%{transform:rotate(-15deg) scale(0.9)} 75%{transform:rotate(10deg) scale(1.1)}
    100%{transform:rotate(0) scale(1)}
  }

  #roll-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 12px 28px;
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 0 #c0392b, 0 6px 16px rgba(255,107,107,0.4);
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  #roll-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 0 #c0392b, 0 8px 20px rgba(255,107,107,0.4); }
  #roll-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #c0392b; }
  #roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #msg-box {
    text-align: center;
    font-weight: 800;
    font-size: 0.95rem;
    color: #555;
    min-height: 36px;
    padding: 4px 8px;
    border-radius: 10px;
    background: #f0f8ff;
    border: 2px dashed #a8d8ea;
    line-height: 1.4;
    transition: all 0.3s;
  }
  #msg-box.event-climb { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
  #msg-box.event-snake { background: #fce4ec; border-color: #e91e63; color: #880e4f; }
  #msg-box.event-win   { background: #fff9c4; border-color: #ffc107; color: #5c3d00; }

  /* Log */
  #log-list {
    max-height: 140px;
    overflow-y: auto;
    font-size: 0.78rem;
    color: #555;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .log-entry {
    padding: 3px 6px;
    border-radius: 6px;
    background: #f5f5f5;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

  #new-game-btn {
    width: 100%;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 12px;
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 0 #4a39c9, 0 6px 16px rgba(108,99,255,0.35);
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  #new-game-btn:hover { transform: translateY(-2px); }
  #new-game-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #4a39c9; }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    display: none;
  }

  /* Win modal */
  #win-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.55);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #win-modal.show { display: flex; }
  .win-card {
    background: white;
    border-radius: 30px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
  .win-card .win-emoji { font-size: 5rem; }
  .win-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: #ff6b6b;
    margin: 10px 0;
  }
  .win-card p { font-size: 1.1rem; color: #666; margin-bottom: 20px; }

  /* Snake bite animation */
  .snake-bite {
    position: absolute;
    font-size: 2rem;
    z-index: 100;
    animation: snakeBite 1.2s ease forwards;
    pointer-events: none;
  }
  @keyframes snakeBite {
    0%{opacity:1;transform:scale(1) rotate(-20deg)}
    30%{transform:scale(1.5) rotate(20deg)}
    60%{transform:scale(1.2) rotate(-10deg)}
    100%{opacity:0;transform:scale(0.5) rotate(0)}
  }

  /* Balloon pop animation */
  .balloon-pop {
    position: absolute;
    font-size: 2rem;
    z-index: 100;
    animation: balloonPop 1s ease forwards;
    pointer-events: none;
  }
  @keyframes balloonPop {
    0%{opacity:1;transform:scale(0.5) translateY(0)}
    50%{transform:scale(1.5) translateY(-20px)}
    80%{transform:scale(1.8) translateY(-30px)}
    100%{opacity:0;transform:scale(0.2) translateY(-50px)}
  }

  /* number color bands on board */
  .cell:nth-child(20n+1), .cell:nth-child(20n+2), .cell:nth-child(20n+3),
  .cell:nth-child(20n+4), .cell:nth-child(20n+5) { background: rgba(255,224,178,0.45); }
  .cell:nth-child(20n+6), .cell:nth-child(20n+7), .cell:nth-child(20n+8),
  .cell:nth-child(20n+9), .cell:nth-child(20n+10) { background: rgba(200,230,201,0.45); }
  .cell:nth-child(20n+11), .cell:nth-child(20n+12), .cell:nth-child(20n+13),
  .cell:nth-child(20n+14), .cell:nth-child(20n+15) { background: rgba(187,222,251,0.45); }
  .cell:nth-child(20n+16), .cell:nth-child(20n+17), .cell:nth-child(20n+18),
  .cell:nth-child(20n+19), .cell:nth-child(20n) { background: rgba(225,190,231,0.45); }

  @media (max-width: 850px) {
    .board-wrap { width: 340px; height: 340px; }
    .panel { flex: 0 0 100%; max-width: 540px; }
    h1 { font-size: 2rem; }
    .player-token { font-size: 13px; }
    .cell-num { font-size: 7px; }
  }
</style>
</head>
<body>

<h1>🎲 Snake & Ladder Party! 🎪</h1>

<div class="main-layout">
  <!-- BOARD -->
  <div class="board-wrap" id="board-wrap">
    <canvas id="overlay"></canvas>
    <div class="board-grid" id="board-grid"></div>
  </div>

  <!-- SIDE PANEL -->
  <div class="panel">

    <!-- Character selection -->
    <div class="card" id="char-card">
      <h3>🎭 Choose Your Players</h3>
      <div style="margin-bottom:8px;font-size:0.82rem;color:#888;font-weight:600;">Player 1 &amp; Player 2 (tap to select)</div>
      <div class="char-grid" id="char-grid-p1"></div>
      <div style="margin:8px 0 4px;font-size:0.82rem;color:#888;font-weight:600;">Player 2</div>
      <div class="char-grid" id="char-grid-p2"></div>
    </div>

    <!-- Players status -->
    <div class="card">
      <h3>🏆 Players</h3>
      <div id="player1-row" class="player-row">
        <span class="emoji" id="p1-emoji">🧒</span>
        <div>
          <div class="pname">Player 1</div>
          <div class="pscore" id="p1-pos">Square: 0</div>
        </div>
        <div class="turn-badge">Your turn!</div>
      </div>
      <div id="player2-row" class="player-row">
        <span class="emoji" id="p2-emoji">🐶</span>
        <div>
          <div class="pname">Player 2</div>
          <div class="pscore" id="p2-pos">Square: 0</div>
        </div>
        <div class="turn-badge">Your turn!</div>
      </div>
    </div>

    <!-- Dice -->
    <div class="card dice-area">
      <h3 style="text-align:center">🎲 Roll the Dice</h3>
      <div id="dice-display">🎲</div>
      <div id="msg-box">Press Roll to start!</div>
      <button id="roll-btn" onclick="rollDice()">🎲 Roll!</button>
    </div>

    <!-- Log -->
    <div class="card">
      <h3>📜 Game Log</h3>
      <div id="log-list"></div>
    </div>

    <button id="new-game-btn" onclick="newGame()">🔄 New Game</button>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<div id="win-modal">
  <div class="win-card">
    <div class="win-emoji" id="win-emoji">🎉</div>
    <h2 id="win-title">Player 1 Wins!</h2>
    <p id="win-msg">Amazing! You made it to 100!</p>
    <button id="new-game-btn2" onclick="newGame()" style="font-family:'Fredoka One',cursive;font-size:1.2rem;padding:12px 30px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:white;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 0 #c0392b;">🎮 Play Again!</button>
  </div>
</div>

<script>
// ============================
//  CHARACTERS
// ============================
const CHARACTERS = [
  {emoji:'🧒',name:'Kid'},    {emoji:'🐶',name:'Dog'},
  {emoji:'🐱',name:'Cat'},    {emoji:'🦊',name:'Fox'},
  {emoji:'🐸',name:'Frog'},   {emoji:'🐼',name:'Panda'},
  {emoji:'🦄',name:'Unicorn'},{emoji:'🐧',name:'Penguin'},
  {emoji:'🤖',name:'Robot'},  {emoji:'👻',name:'Ghost'},
  {emoji:'🦋',name:'Butterfly'},{emoji:'🐙',name:'Octopus'},
];
let p1Char = 0, p2Char = 1;

// ============================
//  BOARD LAYOUT
// ============================
// Maps cell index (0=bottom-left) to [row,col] visually (row 0 = top)
// Cell 100 = top-left. Snakes & Ladders numbered 1-100.
const SNAKES = {
  // head: tail (head > tail, slides down)
  97:78, 95:56, 88:24, 64:60, 49:11, 36:6, 32:10, 62:19
};
const LADDERS = {
  // bottom: top (bottom < top, climbs up)
  4:25, 13:46, 33:49, 42:63, 50:69, 54:88, 62:81, 66:87, 76:91, 2:38
};

// Convert number (1-100) -> {row, col} in 10x10 grid (row0=top)
function numToPos(n) {
  const r = 9 - Math.floor((n-1)/10);
  const col0 = (n-1) % 10;
  // Rows from bottom alternate direction
  const fromBottom = Math.floor((n-1)/10);
  const col = fromBottom % 2 === 0 ? col0 : 9 - col0;
  return {row: r, col};
}
function numToXY(n, cellW, cellH) {
  const {row, col} = numToPos(n);
  return {
    x: col * cellW + cellW/2,
    y: row * cellH + cellH/2
  };
}

// ============================
//  BUILD BOARD
// ============================
let cells = []; // cells[0] unused, cells[1..100] = DOM elements
function buildBoard() {
  const grid = document.getElementById('board-grid');
  grid.innerHTML = '';
  cells = [null];
  // We fill the grid top-left to bottom-right, but cell numbers go bottom-left serpentine
  // Build number map: grid position -> cell number
  const numGrid = [];
  for (let r = 9; r >= 0; r--) {
    const fromBottom = 9 - r;
    for (let c = 0; c < 10; c++) {
      const col = fromBottom % 2 === 0 ? c : 9 - c;
      numGrid.push(fromBottom * 10 + col + 1);
    }
  }
  numGrid.forEach((num, idx) => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.id = 'cell-' + num;
    const numDiv = document.createElement('div');
    numDiv.className = 'cell-num';
    numDiv.textContent = num;
    div.appendChild(numDiv);
    const playersDiv = document.createElement('div');
    playersDiv.className = 'cell-players';
    playersDiv.id = 'players-' + num;
    div.appendChild(playersDiv);
    grid.appendChild(div);
    cells[num] = div;
  });
}

// ============================
//  DRAW SNAKES & LADDERS
// ============================
function drawOverlay() {
  const canvas = document.getElementById('overlay');
  const wrap = document.getElementById('board-wrap');
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const cw = W/10, ch = H/10;

  // Draw ladders
  Object.entries(LADDERS).forEach(([from, to]) => {
    const f = numToXY(+from, cw, ch);
    const t = numToXY(+to, cw, ch);
    drawLadder(ctx, f.x, f.y, t.x, t.y, cw*0.25);
  });

  // Draw snakes
  Object.entries(SNAKES).forEach(([head, tail]) => {
    const h = numToXY(+head, cw, ch);
    const t2 = numToXY(+tail, cw, ch);
    drawSnake(ctx, h.x, h.y, t2.x, t2.y);
  });
}

function drawLadder(ctx, x1, y1, x2, y2, width) {
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  const ux = -dy/len, uy = dx/len;
  const hw = width/2 * 0.4;

  // Rails
  const rails = [
    [x1+ux*hw, y1+uy*hw, x2+ux*hw, y2+uy*hw],
    [x1-ux*hw, y1-uy*hw, x2-ux*hw, y2-uy*hw]
  ];
  const colors = ['#e67e22','#27ae60'];
  rails.forEach(([ax,ay,bx,by], i) => {
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.strokeStyle = colors[i];
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Glow
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.strokeStyle = i===0 ? 'rgba(255,165,0,0.3)' : 'rgba(100,220,100,0.3)';
    ctx.lineWidth = 8;
    ctx.stroke();
  });

  // Rungs
  const numRungs = Math.max(3, Math.floor(len / 40));
  ctx.strokeStyle = '#f39c12';
  ctx.lineWidth = 3;
  for (let i = 1; i < numRungs; i++) {
    const t = i / numRungs;
    const mx = x1 + dx*t, my = y1 + dy*t;
    ctx.beginPath();
    ctx.moveTo(mx+ux*hw, my+uy*hw);
    ctx.lineTo(mx-ux*hw, my-uy*hw);
    ctx.strokeStyle = '#f39c12';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  // Bottom arrow (entry)
  drawArrow(ctx, x1, y1, ux, uy, '#27ae60');
  // Top label
  ctx.save();
  ctx.font = 'bold 14px Nunito, sans-serif';
  ctx.fillStyle = '#27ae60';
  ctx.textAlign = 'center';
  ctx.fillText('🪜', x2, y2 - 8);
  ctx.restore();
}

function drawArrow(ctx, x, y, ux, uy, color) {
  ctx.beginPath();
  ctx.moveTo(x, y+10);
  ctx.lineTo(x-6, y+20);
  ctx.lineTo(x+6, y+20);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawSnake(ctx, hx, hy, tx, ty) {
  // Curved snake using quadratic curves with wiggles
  const dx = tx-hx, dy = ty-hy;
  const midX = (hx+tx)/2, midY = (hy+ty)/2;
  const perpX = -dy*0.3, perpY = dx*0.3;
  const cp1x = hx + dx*0.25 + perpX, cp1y = hy + dy*0.25 + perpY;
  const cp2x = hx + dx*0.75 - perpX, cp2y = hy + dy*0.75 - perpY;

  // Snake body shadow
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tx, ty);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 16;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Snake body gradient
  const grad = ctx.createLinearGradient(hx, hy, tx, ty);
  grad.addColorStop(0, '#e74c3c');
  grad.addColorStop(0.3, '#c0392b');
  grad.addColorStop(0.6, '#e67e22');
  grad.addColorStop(1, '#27ae60');
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tx, ty);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Scale pattern
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tx, ty);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 4;
  ctx.setLineDash([8,8]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Head emoji
  ctx.font = '22px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐍', hx, hy);
  // Tail
  ctx.font = '14px Arial';
  ctx.fillText('💚', tx, ty);
}

// ============================
//  GAME STATE
// ============================
let positions = [0, 0]; // players 0 & 1
let currentPlayer = 0;
let gameOver = false;
let rolling = false;

function newGame() {
  positions = [0, 0];
  currentPlayer = 0;
  gameOver = false;
  rolling = false;
  document.getElementById('win-modal').classList.remove('show');
  document.getElementById('confetti-canvas').style.display = 'none';
  document.getElementById('log-list').innerHTML = '';
  document.getElementById('roll-btn').disabled = false;
  document.getElementById('msg-box').textContent = "Player 1's turn! Roll the dice!";
  document.getElementById('msg-box').className = '';
  updateBoard();
  updateUI();
  addLog('🎮 New game started!');
}

function updateBoard() {
  // Clear all player tokens
  document.querySelectorAll('.cell-players').forEach(el => el.innerHTML = '');
  // Place players
  positions.forEach((pos, pi) => {
    if (pos >= 1 && pos <= 100) {
      const el = document.getElementById('players-' + pos);
      if (el) {
        const span = document.createElement('span');
        span.className = 'player-token' + (pi === currentPlayer && !gameOver ? ' active-turn' : '');
        span.textContent = pi === 0 ? CHARACTERS[p1Char].emoji : CHARACTERS[p2Char].emoji;
        el.appendChild(span);
      }
    }
  });
}

function updateUI() {
  const emojis = [CHARACTERS[p1Char].emoji, CHARACTERS[p2Char].emoji];
  document.getElementById('p1-emoji').textContent = emojis[0];
  document.getElementById('p2-emoji').textContent = emojis[1];
  const pos0 = positions[0], pos1 = positions[1];
  document.getElementById('p1-pos').textContent = pos0 > 0 ? 'Square: ' + pos0 : 'Not started';
  document.getElementById('p2-pos').textContent = pos1 > 0 ? 'Square: ' + pos1 : 'Not started';
  document.getElementById('player1-row').classList.toggle('current-turn', currentPlayer === 0 && !gameOver);
  document.getElementById('player2-row').classList.toggle('current-turn', currentPlayer === 1 && !gameOver);
}

// ============================
//  DICE FACES
// ============================
const DICE_FACES = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'];

function rollDice() {
  if (rolling || gameOver) return;
  rolling = true;
  document.getElementById('roll-btn').disabled = true;
  const diceEl = document.getElementById('dice-display');
  diceEl.classList.add('rolling');

  // Animate rolling
  let count = 0;
  const interval = setInterval(() => {
    diceEl.textContent = DICE_FACES[Math.floor(Math.random()*6)+1];
    count++;
    if (count >= 8) {
      clearInterval(interval);
      diceEl.classList.remove('rolling');
      const roll = Math.floor(Math.random()*6)+1;
      diceEl.textContent = DICE_FACES[roll];
      playDiceSound();
      setTimeout(() => handleRoll(roll), 300);
    }
  }, 80);
}

function handleRoll(roll) {
  const pi = currentPlayer;
  const emoji = pi === 0 ? CHARACTERS[p1Char].emoji : CHARACTERS[p2Char].emoji;
  const name = 'Player ' + (pi+1);
  let oldPos = positions[pi];
  let newPos = oldPos + roll;

  if (newPos > 100) {
    // Can't overshoot 100
    setMsg(`${emoji} ${name} rolled ${roll}. Need exact! Stay at ${oldPos}.`, '');
    addLog(`${emoji} ${name} rolled ${roll} - needs exact to win!`);
    endTurn();
    return;
  }

  positions[pi] = newPos;
  updateBoard();
  setMsg(`${emoji} ${name} rolled ${roll}! Moving to ${newPos}...`, '');
  addLog(`${emoji} ${name} rolled ${roll}: ${oldPos} → ${newPos}`);

  setTimeout(() => {
    // Check ladder
    if (LADDERS[newPos]) {
      const top = LADDERS[newPos];
      positions[pi] = top;
      updateBoard();
      speak('Yay! You climbed a ladder!');
      spawnBalloon(newPos);
      setMsg(`🎈 ${emoji} ${name} climbed a LADDER! ${newPos} → ${top}!`, 'event-climb');
      addLog(`🪜 Ladder! ${newPos} → ${top}`);
      playLadderSound();
      setTimeout(() => checkWin(pi, top), 800);
    }
    // Check snake
    else if (SNAKES[newPos]) {
      const tail = SNAKES[newPos];
      positions[pi] = tail;
      updateBoard();
      speak('Oh no! A snake got you!');
      spawnSnakeBite(newPos);
      setMsg(`🐍 ${emoji} ${name} got bitten! ${newPos} → ${tail}!`, 'event-snake');
      addLog(`🐍 Snake bite! ${newPos} → ${tail}`);
      playSnakeSound();
      setTimeout(() => { updateBoard(); endTurn(); }, 1000);
    }
    else {
      checkWin(pi, newPos);
    }
  }, 600);
}

function checkWin(pi, pos) {
  updateBoard();
  if (pos === 100) {
    gameOver = true;
    const emoji = pi === 0 ? CHARACTERS[p1Char].emoji : CHARACTERS[p2Char].emoji;
    const name = 'Player ' + (pi+1);
    setMsg(`🎉 ${emoji} ${name} WINS!!! 🎉`, 'event-win');
    speak(name + ' wins! Congratulations!');
    showWin(pi);
    addLog(`🏆 ${emoji} ${name} WINS THE GAME!`);
    launchConfetti();
    return;
  }
  endTurn();
}

function endTurn() {
  currentPlayer = 1 - currentPlayer;
  updateUI();
  updateBoard();
  rolling = false;
  document.getElementById('roll-btn').disabled = false;
  if (!gameOver) {
    const emoji = currentPlayer === 0 ? CHARACTERS[p1Char].emoji : CHARACTERS[p2Char].emoji;
    const name = 'Player ' + (currentPlayer+1);
    if (!document.getElementById('msg-box').classList.contains('event-climb') &&
        !document.getElementById('msg-box').classList.contains('event-snake')) {
      setMsg(`${emoji} ${name}'s turn! Roll the dice!`, '');
    }
  }
}

function setMsg(text, cls) {
  const el = document.getElementById('msg-box');
  el.textContent = text;
  el.className = cls;
}

function addLog(text) {
  const log = document.getElementById('log-list');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.textContent = text;
  log.insertBefore(div, log.firstChild);
  while (log.children.length > 20) log.removeChild(log.lastChild);
}

// ============================
//  ANIMATIONS
// ============================
function spawnBalloon(cellNum) {
  const cell = document.getElementById('cell-' + cellNum);
  if (!cell) return;
  const rect = cell.getBoundingClientRect();
  const boardRect = document.getElementById('board-wrap').getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'balloon-pop';
  el.textContent = ['🎈','🎉','⭐','✨','🌟'][Math.floor(Math.random()*5)];
  el.style.left = (rect.left - boardRect.left + rect.width/2 - 16) + 'px';
  el.style.top = (rect.top - boardRect.top) + 'px';
  document.getElementById('board-wrap').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnSnakeBite(cellNum) {
  const cell = document.getElementById('cell-' + cellNum);
  if (!cell) return;
  const rect = cell.getBoundingClientRect();
  const boardRect = document.getElementById('board-wrap').getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'snake-bite';
  el.textContent = '💥';
  el.style.left = (rect.left - boardRect.left + rect.width/2 - 16) + 'px';
  el.style.top = (rect.top - boardRect.top) + 'px';
  document.getElementById('board-wrap').appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function showWin(pi) {
  document.getElementById('win-emoji').textContent = pi === 0 ? CHARACTERS[p1Char].emoji : CHARACTERS[p2Char].emoji;
  document.getElementById('win-title').textContent = 'Player ' + (pi+1) + ' Wins! 🎊';
  document.getElementById('win-msg').textContent = 'Amazing! You reached square 100!';
  document.getElementById('win-modal').classList.add('show');
}

// ============================
//  CONFETTI
// ============================
let confettiParticles = [];
let confettiFrame;
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  confettiParticles = [];
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9ff3','#54a0ff','#ff9f43','#a29bfe'];
  for (let i = 0; i < 200; i++) {
    confettiParticles.push({
      x: Math.random() * canvas.width,
      y: -20,
      w: Math.random()*12+4,
      h: Math.random()*8+4,
      color: colors[Math.floor(Math.random()*colors.length)],
      angle: Math.random()*360,
      spin: (Math.random()-0.5)*8,
      vx: (Math.random()-0.5)*4,
      vy: Math.random()*4+2,
      alpha: 1
    });
  }
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    confettiParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.angle += p.spin;
      p.vy += 0.05;
      if (p.y < canvas.height + 30) { alive = true; }
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (alive) confettiFrame = requestAnimationFrame(animate);
    else canvas.style.display = 'none';
  }
  cancelAnimationFrame(confettiFrame);
  animate();
  setTimeout(() => { canvas.style.display = 'none'; cancelAnimationFrame(confettiFrame); }, 6000);
}

// ============================
//  SOUND (Web Audio API)
// ============================
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type='sine', vol=0.3) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function playDiceSound() {
  [300,400,500].forEach((f,i) => setTimeout(() => playTone(f,0.1,'square',0.15), i*60));
}
function playLadderSound() {
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,0.2,'sine',0.2), i*100));
}
function playSnakeSound() {
  [400,350,300,250,200].forEach((f,i) => setTimeout(() => playTone(f,0.15,'sawtooth',0.15), i*80));
}

// ============================
//  SPEECH
// ============================
function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.pitch = 1.3; u.rate = 0.95; u.volume = 0.8;
    window.speechSynthesis.speak(u);
  }
}

// ============================
//  CHARACTER SELECT
// ============================
function buildCharSelect() {
  ['p1','p2'].forEach((pid, pi) => {
    const grid = document.getElementById('char-grid-' + pid);
    grid.innerHTML = '';
    CHARACTERS.forEach((c, ci) => {
      const btn = document.createElement('button');
      btn.className = 'char-btn' + ((pi === 0 && ci === p1Char) || (pi === 1 && ci === p2Char) ? ' selected' : '');
      btn.innerHTML = c.emoji + '<span class="char-label">' + c.name + '</span>';
      btn.onclick = () => {
        if (pi === 0) { p1Char = ci; }
        else { p2Char = ci; }
        buildCharSelect();
        updateUI();
        updateBoard();
      };
      grid.appendChild(btn);
    });
  });
}

// ============================
//  INIT
// ============================
window.addEventListener('load', () => {
  buildBoard();
  buildCharSelect();
  newGame();
  setTimeout(drawOverlay, 100);
});

window.addEventListener('resize', () => {
  setTimeout(drawOverlay, 100);
});
</script>
