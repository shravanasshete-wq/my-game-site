<!DOCTYPE html>
<html>
<head>
  <title>Memory Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .grid {
      display: grid;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .card {
      width: 120px;
      height: 120px;
      position: relative;
      cursor: pointer;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    /* CARD COVER (FRONT) */
    .front {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: rgba(255, 255, 255, 0.7);
      /* Default background just in case */
      background-color: #333; 
    }

    /* HIDDEN EMOJI SIDE (BACK) */
    .back {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      display: none;
    }
  </style>
</head>
<body>

<h2>🧩 Memory Game - Level <span id="level">1</span></h2>

<div class="grid" id="game"></div>

<script>
let level = 1;
let first = null, second = null;
let lock = false;

// LEVEL CONFIG
// Replaced 'char' URLs with 'bg' pure CSS gradients so they never fail to load!
const levelsData = [
  { count: 10, cols: 5, bg: "linear-gradient(135deg, #e23636, #8B0000)" }, // L1: Spider-Man Colors (Red)
  { count: 20, cols: 5, bg: "linear-gradient(135deg, #434343, #000000)" }, // L2: Batman Colors (Black/Grey)
  { count: 30, cols: 6, bg: "linear-gradient(135deg, #005b9f, #e23636)" }, // L3: Superman Colors (Blue/Red)
  { count: 40, cols: 8, bg: "linear-gradient(135deg, #c3cbdc, #edf1f4)" }, // L4: Roblox Colors (Silver)
  { count: 50, cols: 10, bg: "linear-gradient(135deg, #0000ff, #ffffff)" } // L5: Captain America Colors (Blue/White)
];

// SYMBOLS FOR MATCHING
const symbols = ["🍎","🐱","🚗","⭐","🎵","🔥","🎲","⚽","🍕","🎁",
                 "🚀","🌈","🎧","📚","🧩","🐶","🍔","💎","🎮","🦄"];

function startLevel() {
  document.getElementById("level").innerText = level;

  let game = document.getElementById("game");
  game.innerHTML = "";

  let data = levelsData[level - 1];
  let pairs = data.count / 2;

  let selected = symbols.slice(0, pairs);

  let cards = [];
  selected.forEach(s => {
    cards.push(s);
    cards.push(s);
  });

  cards.sort(() => 0.5 - Math.random());

  // Force columns based on levelsData so Level 1 always has exactly 2 rows
  game.style.gridTemplateColumns = `repeat(${data.cols}, 120px)`;

  first = second = null;
  lock = false;

  cards.forEach(symbol => {
    let card = document.createElement("div");
    card.className = "card";

    let front = document.createElement("div");
    front.className = "front";
    // Apply the pure CSS background color/gradient
    front.style.background = data.bg;
    front.innerHTML = "❓"; // Adding a question mark to the card covers

    let back = document.createElement("div");
    back.className = "back";
    back.innerHTML = symbol;

    card.appendChild(front);
    card.appendChild(back);

    card.onclick = () => {
      if (lock || back.style.display === "flex") return;

      back.style.display = "flex";

      if (!first) {
        first = card;
      } else {
        second = card;
        lock = true;

        let val1 = first.querySelector(".back").innerHTML;
        let val2 = second.querySelector(".back").innerHTML;

        if (val1 !== val2) {
          setTimeout(() => {
            first.querySelector(".back").style.display = "none";
            second.querySelector(".back").style.display = "none";
            resetTurn();
          }, 600);
        } else {
          resetTurn();
          checkWin();
        }
      }
    };

    game.appendChild(card);
  });
}

function resetTurn() {
  first = second = null;
  lock = false;
}

function checkWin() {
  let all = document.querySelectorAll(".back");
  let done = [...all].every(b => b.style.display === "flex");

  if (done) {
    setTimeout(() => {
      if (level < 5) {
        level++;
        alert("🎉 Level Up!");
        startLevel();
      } else {
        alert("🏆 You completed all levels!");
      }
    }, 500);
  }
}

startLevel();
</script>

</body>
</html>
