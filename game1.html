<!DOCTYPE html>
<html>
<head>
<title>🎯 Balloon Shooter PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  background: linear-gradient(#87CEEB, #ffffff);
  overflow:hidden;
}

/* LOGIN */
.loginCard {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* GAME */
#gameArea {
  position:relative;
  height:100vh;
  display:none;
}

/* TOP BAR */
#topBar {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.9);
  padding:10px 20px;
  border-radius:15px;
}

/* 🔫 GUN */
#gun {
  position:absolute;
  bottom:20px;
  left:50%;
  width:60px;
  height:60px;
  background:black;
  border-radius:10px;
  transform:translateX(-50%);
}

/* BULLET */
.bullet {
  width:6px;
  height:18px;
  background:black;
  position:absolute;
}

/* BALLOON */
.balloon {
  width:60px;
  height:80px;
  border-radius:50%;
  position:absolute;
}
.red{background:red;}
.blue{background:blue;}
.green{background:green;}
.yellow{background:gold;}

</style>
</head>

<body>

<div id="login" class="loginCard">
  <h2>🎮 Balloon Shooter PRO</h2>
  <input id="playerName" placeholder="Your name"><br><br>
  <button onclick="startGame()">Start</button>
</div>

<div id="gameArea">
  <div id="topBar">
    <div id="gameInfo"></div>
    <span id="speedLabel">🐢 Easy</span><br>
    <input type="range" min="1" max="5" value="1" id="speedControl" onchange="changeSpeed()">
  </div>

  <div id="gun"></div>
</div>

<script>

let name="", score=0, lives=3, time=60;
let spawnDelay=2000, riseSpeed=1;

/* 🔊 MUSIC */
let bgMusic = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_3e4b8c7a6e.mp3?filename=game-music-loop-109252.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

let shootSound = new Audio("https://www.soundjay.com/mechanical/sounds/mechanical-clonk-1.mp3");
let popSound = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");

/* GUN POSITION */
let gunX = window.innerWidth / 2;

/* START */
function startGame(){
  name=document.getElementById("playerName").value || "Player";
  localStorage.setItem("playerName", name);

  login.style.display="none";
  gameArea.style.display="block";

  bgMusic.play();
  updateInfo();

  setInterval(updateTimer,1000);
  setInterval(createBalloon,spawnDelay);
}

/* TIMER */
function updateTimer(){
  time--;
  updateInfo();
  if(time<=0) endGame();
}

/* INFO */
function updateInfo(){
  document.getElementById("gameInfo").innerText =
    "👤 "+name+" | 🎯 "+score+" | ❤️ "+lives+" | ⏱ "+time;
}

/* SPEED */
function changeSpeed(){
  let level=document.getElementById("speedControl").value;
  if(level==1){spawnDelay=2500;riseSpeed=0.8;}
  if(level==2){spawnDelay=2000;riseSpeed=1.2;}
  if(level==3){spawnDelay=1500;riseSpeed=2;}
  if(level==4){spawnDelay=1000;riseSpeed=3;}
  if(level==5){spawnDelay=600;riseSpeed=4;}
}

/* BALLOON */
function createBalloon(){
  const b=document.createElement("div");
  b.className="balloon "+["red","blue","green","yellow"][Math.floor(Math.random()*4)];
  b.style.left=Math.random()*90+"%";
  b.style.top="100%";
  gameArea.appendChild(b);

  let move=setInterval(()=>{
    let top=parseFloat(b.style.top);
    if(top<0){
      b.remove();
      lives--;
      updateInfo();
      if(lives<=0) endGame();
      clearInterval(move);
    } else {
      b.style.top=(top-riseSpeed)+"%";
    }
  },50);

  b.dataset.move = move;
}

/* 🔫 MOVE GUN */
document.addEventListener("keydown", function(e){
  if(e.key==="ArrowLeft" || e.key==="a"){
    gunX -= 20;
  }
  if(e.key==="ArrowRight" || e.key==="d"){
    gunX += 20;
  }

  /* LIMIT */
  if(gunX < 30) gunX = 30;
  if(gunX > window.innerWidth-30) gunX = window.innerWidth-30;

  document.getElementById("gun").style.left = gunX + "px";
});

/* 🔫 SHOOT (space or click) */
document.addEventListener("keydown", function(e){
  if(e.code==="Space") shoot();
});

gameArea.addEventListener("click", shoot);

function shoot(){
  shootSound.currentTime=0;
  shootSound.play();

  const bullet=document.createElement("div");
  bullet.className="bullet";
  bullet.style.left=gunX+"px";
  bullet.style.top="90%";

  gameArea.appendChild(bullet);

  let move=setInterval(()=>{
    let top=parseFloat(bullet.style.top);
    bullet.style.top=(top-3)+"%";

    document.querySelectorAll(".balloon").forEach(b=>{
      let r1=bullet.getBoundingClientRect();
      let r2=b.getBoundingClientRect();

      if(r1.top<r2.bottom && r1.bottom>r2.top &&
         r1.left<r2.right && r1.right>r2.left){

        popSound.currentTime=0;
        popSound.play();

        score++;
        updateInfo();

        clearInterval(b.dataset.move);
        b.remove();
        bullet.remove();
        clearInterval(move);
      }
    });

    if(top<0){
      bullet.remove();
      clearInterval(move);
    }

  },30);
}

/* END */
function endGame(){
  bgMusic.pause();
  alert("Game Over! Score: "+score);
  location.reload();
}

</script>

</body>
</html>
