<!DOCTYPE html>
<html>
<head>
  <title>Balloon Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(#87CEEB, #ffffff);
      text-align: center;

      /* 👆 Human hand cursor */
      cursor: url('https://cdn-icons-png.flaticon.com/128/1828/1828817.png'), auto;
    }

    h2 { margin: 10px; }

    #score {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .active {
      background: #ff5722;
    }

    .balloon {
      width: 60px;
      height: 80px;
      border-radius: 50%;
      position: absolute;
    }

    .red { background: red; }
    .blue { background: blue; }
    .green { background: green; }
    .yellow { background: gold; }

    a {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 6px 10px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<a href="index.html">⬅ Back</a>

<h2>🎈 Balloon Game</h2>
<div id="score">Score: 0</div>

<div class="controls">
  Speed:
  <button id="low" onclick="setSpeed(1800)">Low</button>
  <button onclick="setSpeed(1200)">Medium</button>
  <button onclick="setSpeed(600)">High</button>
</div>

<script>
let score = 0;
let speed = 1800; // VERY SLOW (default)
let gameInterval;

// highlight default
document.getElementById("low").classList.add("active");

function setSpeed(newSpeed) {
  speed = newSpeed;

  clearInterval(gameInterval);
  gameInterval = setInterval(createBalloon, speed);

  document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}

function createBalloon() {
  const b = document.createElement("div");
  b.className = "balloon";

  const colors = ["red","blue","green","yellow"];
  b.classList.add(colors[Math.floor(Math.random() * colors.length)]);

  b.style.left = Math.random() * (window.innerWidth - 60) + "px";
  b.style.top = window.innerHeight + "px";

  document.body.appendChild(b);

  let move = setInterval(() => {
    let top = parseFloat(b.style.top);
    if (top < -100) {
      b.remove();
      clearInterval(move);
    } else {
      b.style.top = (top - 2) + "px"; // slower movement
    }
  }, 30);

  function pop() {
    score++;
    document.getElementById("score").innerText = "Score: " + score;

    // simple clean remove (no burst effect)
    b.remove();
    clearInterval(move);
  }

  b.addEventListener("click", pop);
  b.addEventListener("touchstart", pop);
}

// start game
gameInterval = setInterval(createBalloon, speed);
</script>

</body>
</html>
