<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Snakes & Ladders 3D Ultra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Rajdhani:wght@500;700&family=Orbitron:wght@700;900&display=swap');

:root {
  --mango-light: #FFC324;
  --mango-dark: #FF8243;
  --neon-blue: #00f5ff;
  --neon-pink: #ff00ff;
  --neon-yellow: #ccff00;
  --neon-green: #00ff88;
  --bg-dark: #0a0e1a;
  --cell-light: #1e2a42;
  --cell-dark: #141c2e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,0,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255,195,36,0.1) 0%, transparent 50%);
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background:
    linear-gradient(45deg, transparent 30%, rgba(0,245,255,0.03) 50%, transparent 70%),
    linear-gradient(-45deg, transparent 30%, rgba(255,0,255,0.03) 50%, transparent 70%);
  animation: aurora 15s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes aurora {
  0%, 100% { transform: translateX(-10%) skewX(0deg); }
  50% { transform: translateX(10%) skewX(5deg); }
}

header {
  background: linear-gradient(135deg, var(--mango-light), var(--neon-pink), var(--mango-dark));
  background-size: 200% 200%;
  animation: gradientShift 3s ease infinite;
  color: #000;
  text-align: center;
  padding: 10px 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  box-shadow: 0 4px 30px rgba(255,130,67,0.6), 0 0 60px rgba(255,0,255,0.3);
  z-index: 100;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.8);
  position: relative;
  flex-shrink: 0;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

footer {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--mango-light));
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
  color: #000;
  text-align: center;
  padding: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  flex-shrink: 0;
  z-index: 100;
}

#main-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding: 10px;
  gap: 12px;
  position: relative;
  z-index: 1;
  min-height: 0;
}

/* ── SIDE PANEL ── */
#side-panel {
  width: 210px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.6);
  border: 2px solid rgba(0,245,255,0.4);
  box-shadow: 0 0 30px rgba(0,245,255,0.25), inset 0 0 30px rgba(255,0,255,0.08);
  border-radius: 16px;
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  backdrop-filter: blur(16px);
  animation: panelGlow 3s ease-in-out infinite;
  overflow: hidden;
}

@keyframes panelGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(0,245,255,0.25), inset 0 0 30px rgba(255,0,255,0.08); }
  50% { box-shadow: 0 0 40px rgba(255,0,255,0.3), inset 0 0 40px rgba(0,245,255,0.1); }
}

.panel-section { text-align: center; }
.panel-label {
  color: var(--neon-blue);
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 3px;
  font-size: 11px;
  margin-bottom: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--neon-blue);
}

select {
  width: 100%;
  padding: 8px 10px;
  background: rgba(0,0,0,0.8);
  color: var(--neon-yellow);
  border: 2px solid var(--neon-pink);
  border-radius: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  outline: none;
  box-shadow: 0 0 15px rgba(255,0,255,0.2);
  transition: all 0.3s;
}
select:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0,245,255,0.4);
}

.info-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  padding: 3px 0;
}
.info-val {
  color: var(--neon-yellow);
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  text-shadow: 0 0 10px var(--neon-yellow);
}

/* ── 3D DICE ── */
#dice-scene {
  perspective: 300px;
  width: 80px;
  height: 80px;
  margin: 0 auto 8px;
  cursor: pointer;
  filter: drop-shadow(0 0 20px rgba(0,245,255,0.5));
}
#dice-cube {
  width: 80px;
  height: 80px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(-25deg) rotateY(20deg);
  transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#dice-cube.rolling {
  animation: diceRoll 0.8s ease-in-out;
}
@keyframes diceRoll {
  0%   { transform: rotateX(-25deg) rotateY(20deg) rotateZ(0deg); }
  20%  { transform: rotateX(180deg) rotateY(120deg) rotateZ(90deg); }
  40%  { transform: rotateX(360deg) rotateY(240deg) rotateZ(180deg); }
  60%  { transform: rotateX(540deg) rotateY(360deg) rotateZ(270deg); }
  80%  { transform: rotateX(680deg) rotateY(480deg) rotateZ(315deg); }
  100% { transform: var(--final-transform); }
}
.dice-face {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 14px;
  display: grid;
  padding: 10px;
  gap: 4px;
  border: 3px solid #ddd;
  box-shadow:
    inset 0 0 15px rgba(0,0,0,0.1),
    inset 0 0 30px rgba(255,255,255,0.8),
    0 0 20px rgba(0,245,255,0.3);
}
.dice-face.f1 { transform: translateZ(40px); }
.dice-face.f2 { transform: rotateY(180deg) translateZ(40px); }
.dice-face.f3 { transform: rotateY(90deg) translateZ(40px); }
.dice-face.f4 { transform: rotateY(-90deg) translateZ(40px); }
.dice-face.f5 { transform: rotateX(90deg) translateZ(40px); }
.dice-face.f6 { transform: rotateX(-90deg) translateZ(40px); }

.dot {
  width: 12px; height: 12px;
  background: radial-gradient(circle at 30% 30%, #333, #000);
  border-radius: 50%;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.4), inset 1px 1px 2px rgba(255,255,255,0.2);
}
.face-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; place-items: center; }
.face-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.face-2 .dot:nth-child(1) { grid-column:1; grid-row:1; align-self:start; justify-self:start; }
.face-2 .dot:nth-child(2) { grid-column:2; grid-row:2; align-self:end; justify-self:end; }
.face-3 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
.face-3 .dot:nth-child(1) { grid-column:1; grid-row:1; }
.face-3 .dot:nth-child(2) { grid-column:2; grid-row:2; place-self:center; }
.face-3 .dot:nth-child(3) { grid-column:3; grid-row:3; align-self:end; justify-self:end; }
.face-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.face-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
.face-5 .dot:nth-child(1) { grid-column:1; grid-row:1; }
.face-5 .dot:nth-child(2) { grid-column:3; grid-row:1; }
.face-5 .dot:nth-child(3) { grid-column:2; grid-row:2; place-self:center; }
.face-5 .dot:nth-child(4) { grid-column:1; grid-row:3; }
.face-5 .dot:nth-child(5) { grid-column:3; grid-row:3; }
.face-6 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }

.dice-face.f1 { background: linear-gradient(145deg, #fff, #ffe0e0); }
.dice-face.f2 { background: linear-gradient(145deg, #fff, #e0ffe0); }
.dice-face.f3 { background: linear-gradient(145deg, #fff, #e0e0ff); }
.dice-face.f4 { background: linear-gradient(145deg, #fff, #ffe0ff); }
.dice-face.f5 { background: linear-gradient(145deg, #fff, #ffffe0); }
.dice-face.f6 { background: linear-gradient(145deg, #fff, #e0ffff); }

#message {
  color: var(--neon-yellow);
  font-weight: 700;
  font-size: 14px;
  min-height: 36px;
  line-height: 1.3;
  font-family: 'Rajdhani', sans-serif;
  text-shadow: 0 0 15px var(--neon-yellow);
  animation: msgPulse 2s ease-in-out infinite;
}

@keyframes msgPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.btn {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 4px 25px rgba(0,245,255,0.5), 0 0 40px rgba(255,0,255,0.3);
  transition: transform 0.1s, filter 0.2s, box-shadow 0.2s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%; width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(45deg);
  animation: btnShine 3s infinite;
}
@keyframes btnShine {
  0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
  100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}
.btn:hover {
  filter: brightness(1.3);
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 6px 30px rgba(0,245,255,0.7), 0 0 60px rgba(255,0,255,0.5);
}
.btn:active { transform: translateY(2px) scale(0.98); }
.btn:disabled {
  background: #2a3040;
  color: #5a6080;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}
.btn:disabled::before { display: none; }

.btn-new {
  background: linear-gradient(135deg, var(--mango-light), var(--neon-green));
  color: #000;
  box-shadow: 0 4px 25px rgba(255,195,36,0.5), 0 0 40px rgba(0,255,136,0.3);
  font-size: 13px;
  padding: 9px;
}

/* ── BOARD AREA — TRUE SQUARE, FILLS HEIGHT ── */
#board-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
}

#board-wrapper {
  /* Keep the board perfectly square, fit inside available space */
  width: min(100%, calc(100vh - 120px));
  height: min(100%, calc(100vh - 120px));
  aspect-ratio: 1 / 1;
  position: relative;
  flex-shrink: 0;
}

#board-surface {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0f1628, #1a2340);
  border-radius: 10px;
  border: 3px solid;
  border-image: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--mango-light)) 1;
  box-shadow:
    0 0 0 1px rgba(0,245,255,0.4),
    0 20px 60px rgba(0,0,0,0.9),
    0 0 60px rgba(0,245,255,0.2),
    0 0 100px rgba(255,0,255,0.1);
  position: relative;
  overflow: hidden;
}

#board {
  display: grid;
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: 7px;
  overflow: hidden;
}

/* ── CELLS ── */
.cell {
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 3px 4px;
  font-size: clamp(6px, 1vw, 12px);
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  color: rgba(255,255,255,0.25);
  position: relative;
  background: var(--cell-dark);
  transition: all 0.3s;
}
.cell:nth-child(even) { background: var(--cell-light); }
.cell.start-cell {
  background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(0,245,255,0.05)) !important;
  color: var(--neon-blue) !important;
  box-shadow: inset 0 0 15px rgba(0,245,255,0.3);
  animation: startPulse 2s ease-in-out infinite;
}
@keyframes startPulse {
  0%, 100% { box-shadow: inset 0 0 15px rgba(0,245,255,0.3); }
  50% { box-shadow: inset 0 0 25px rgba(0,245,255,0.5); }
}
.cell.end-cell {
  background: linear-gradient(135deg, rgba(255,195,36,0.3), rgba(255,130,67,0.15)) !important;
  color: var(--mango-light) !important;
  box-shadow: inset 0 0 20px rgba(255,195,36,0.4);
  animation: endPulse 2s ease-in-out infinite;
}
@keyframes endPulse {
  0%, 100% { box-shadow: inset 0 0 20px rgba(255,195,36,0.4); }
  50% { box-shadow: inset 0 0 35px rgba(255,195,36,0.7); }
}
.cell.highlight {
  background: rgba(204,255,0,0.25) !important;
  animation: highlightFlash 0.5s ease;
}
@keyframes highlightFlash {
  0%, 100% { background: rgba(204,255,0,0.2) !important; }
  50% { background: rgba(204,255,0,0.45) !important; }
}

/* ── SVG OVERLAY ── */
#svg-layer {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  overflow: visible;
}

/* ── PLAYER TOKEN ── */
#player-scene {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 50;
  pointer-events: none;
}
#player {
  width: 36px;
  height: 42px;
  position: absolute;
  transform: translate(-18px, -42px);
  transition: left 0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
              top  0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.9));
}
.token-shadow {
  position: absolute;
  width: 36px; height: 10px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.7) 0%, transparent 70%);
  bottom: -6px; left: 0;
  border-radius: 50%;
  animation: shadowPulse 1.2s ease-in-out infinite;
}
@keyframes shadowPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(0.8); opacity: 0.5; }
}
.token-body {
  width: 36px; height: 36px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  background: radial-gradient(circle at 35% 25%,
    #ff80c0 0%, #ff2080 35%, #ff0080 60%, #8b0040 85%, #3a0018 100%);
  box-shadow:
    inset -5px -6px 10px rgba(0,0,0,0.6),
    inset 4px 4px 8px rgba(255,255,255,0.5),
    0 0 0 3px rgba(255,255,255,0.7),
    0 0 20px rgba(255,32,128,0.8);
  position: absolute;
  top: 0; left: 0;
  animation: tokenBob 1.2s ease-in-out infinite, tokenGlow 2s ease-in-out infinite;
}
@keyframes tokenGlow {
  0%, 100% { box-shadow: inset -5px -6px 10px rgba(0,0,0,0.6), inset 4px 4px 8px rgba(255,255,255,0.5), 0 0 0 3px rgba(255,255,255,0.7), 0 0 20px rgba(255,32,128,0.8); }
  50% { box-shadow: inset -5px -6px 10px rgba(0,0,0,0.6), inset 4px 4px 8px rgba(255,255,255,0.5), 0 0 0 3px rgba(255,255,255,0.7), 0 0 35px rgba(255,32,128,1); }
}
.token-highlight {
  position: absolute;
  width: 13px; height: 10px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.9) 0%, transparent 100%);
  top: 5px; left: 7px;
  border-radius: 50%;
}
.token-pin {
  position: absolute;
  width: 5px; height: 18px;
  background: linear-gradient(to bottom, #eee, #666, #333);
  bottom: -12px; left: 15.5px;
  border-radius: 2px;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.6);
}
@keyframes tokenBob {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
}

.token-trail {
  position: absolute;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,32,128,0.4), transparent);
  pointer-events: none;
  animation: trailFade 0.6s ease-out forwards;
  transform: translate(-18px, -36px);
}
@keyframes trailFade {
  0% { transform: translate(-18px,-36px) scale(1); opacity: 0.8; }
  100% { transform: translate(-18px,-36px) scale(2); opacity: 0; }
}

@keyframes tokenJump {
  0%   { transform: translateY(0px) scale(1); }
  40%  { transform: translateY(-22px) scale(1.15); }
  100% { transform: translateY(0px) scale(1); }
}
#player.jumping .token-body { animation: tokenJump 0.35s ease-out; }

/* ── PARTICLES ── */
.particle {
  position: absolute;
  pointer-events: none;
  z-index: 100;
  border-radius: 50%;
  animation: particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  15% { transform: translate(-6px, -4px); }
  30% { transform: translate(6px, -4px); }
  45% { transform: translate(-6px, 4px); }
  60% { transform: translate(6px, 4px); }
  75% { transform: translate(-4px, -2px); }
  90% { transform: translate(4px, -2px); }
}
.shake { animation: shake 0.5s ease; }

/* Snake scale pattern helper */
.snake-scale-pattern { pointer-events: none; }
</style>
</head>
<body>

<header>🐍 Snakes &amp; Ladders — ULTRA 3D 🎲</header>

<div id="main-container">
  <div id="side-panel">
    <div class="panel-section">
      <div class="panel-label">Level</div>
      <select id="levelSelect" onchange="changeLevel()">
        <option value="1">Level 1 · 1→50</option>
        <option value="2">Level 2 · 1→100</option>
        <option value="3">Level 3 · 1→150</option>
        <option value="4">Level 4 · 1→200</option>
        <option value="5">Level 5 · 1→250</option>
      </select>
    </div>

    <div class="panel-section">
      <div class="panel-label">Stats</div>
      <div class="info-row"><span>Position</span><span class="info-val" id="statPos">1</span></div>
      <div class="info-row" style="margin-top:3px"><span>Rolls</span><span class="info-val" id="statRolls">0</span></div>
      <div class="info-row" style="margin-top:3px"><span>Snakes</span><span class="info-val" id="statSnakes">0</span></div>
      <div class="info-row" style="margin-top:3px"><span>Ladders</span><span class="info-val" id="statLadders">0</span></div>
    </div>

    <div class="panel-section" style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px;">
      <div id="dice-scene">
        <div id="dice-cube">
          <div class="dice-face f1 face-1"><div class="dot"></div></div>
          <div class="dice-face f2 face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f3 face-2"><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f4 face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f5 face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f6 face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      </div>
      <div id="message">Ready to roll!</div>
    </div>

    <div class="panel-section" style="display:flex;flex-direction:column;gap:8px;">
      <button id="rollBtn" class="btn" onclick="playTurn()">🎲 Roll Dice</button>
      <button class="btn btn-new" onclick="changeLevel()">↺ New Game</button>
    </div>
  </div>

  <div id="board-area">
    <div id="board-wrapper">
      <div id="board-surface">
        <div id="board"></div>
        <svg id="svg-layer"></svg>
        <div id="player-scene">
          <div id="player">
            <div class="token-body"></div>
            <div class="token-highlight"></div>
            <div class="token-pin"></div>
            <div class="token-shadow"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>Snakes &amp; Ladders 3D Ultra · Neon Edition</footer>

<script>
const levels = {
  1: { max: 50,  rows: 5  },
  2: { max: 100, rows: 10 },
  3: { max: 150, rows: 15 },
  4: { max: 200, rows: 20 },
  5: { max: 250, rows: 25 }
};

const diceTransforms = {
  1: 'rotateX(0deg) rotateY(0deg)',
  2: 'rotateX(0deg) rotateY(-90deg)',
  3: 'rotateX(-90deg) rotateY(0deg)',
  4: 'rotateX(90deg) rotateY(0deg)',
  5: 'rotateX(0deg) rotateY(90deg)',
  6: 'rotateX(0deg) rotateY(180deg)'
};

// Diverse snake color palettes for 3D look
const snakePalettes = [
  { body: '#22c55e', belly: '#86efac', dark: '#15803d', eye: '#fff', pupil: '#000', stripe: '#166534' },
  { body: '#ef4444', belly: '#fca5a5', dark: '#b91c1c', eye: '#fff', pupil: '#111', stripe: '#7f1d1d' },
  { body: '#f97316', belly: '#fed7aa', dark: '#c2410c', eye: '#fff', pupil: '#1a0000', stripe: '#7c2d12' },
  { body: '#8b5cf6', belly: '#ddd6fe', dark: '#6d28d9', eye: '#fff', pupil: '#000', stripe: '#4c1d95' },
  { body: '#06b6d4', belly: '#a5f3fc', dark: '#0e7490', eye: '#fff', pupil: '#000', stripe: '#164e63' },
  { body: '#eab308', belly: '#fef08a', dark: '#a16207', eye: '#c00', pupil: '#000', stripe: '#713f12' },
];

let currentLevel = 1;
let currentPos = 1;
let maxPos = 50;
let isAnimating = false;
let jumps = {};
let snakeColors = {};
let rolls = 0, snakes = 0, ladders = 0;

const AC = window.AudioContext || window.webkitAudioContext;
let actx;

function playTone(freq, type, duration, vol=0.08) {
  try {
    if (!actx) actx = new AC();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + duration);
  } catch(e) {}
}

function updateStats() {
  document.getElementById('statPos').innerText = currentPos;
  document.getElementById('statRolls').innerText = rolls;
  document.getElementById('statSnakes').innerText = snakes;
  document.getElementById('statLadders').innerText = ladders;
}

function generateJumps() {
  jumps = {};
  snakeColors = {};
  const numJumps = Math.floor(maxPos / 6);
  let paletteIdx = 0;

  for(let i = 0; i < numJumps; i++) {
    // Ladder (up)
    let startL = Math.floor(Math.random() * (maxPos - 14)) + 3;
    let endL = startL + Math.floor(Math.random() * 18) + 8;
    if (endL < maxPos && !jumps[startL] && !Object.values(jumps).includes(startL) && startL > 1) {
      jumps[startL] = endL;
    }

    // Snake (down)
    let endS = Math.floor(Math.random() * (maxPos - 22)) + 2;
    let startS = endS + Math.floor(Math.random() * 18) + 10;
    if (startS < maxPos && !jumps[startS] && !Object.values(jumps).includes(startS) && endS > 1) {
      jumps[startS] = endS;
      snakeColors[startS] = snakePalettes[paletteIdx % snakePalettes.length];
      paletteIdx++;
    }
  }
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const cols = 10;
  const rows = levels[currentLevel].rows;

  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  let cellNum = maxPos;
  for(let r = 0; r < rows; r++) {
    let rowCells = [];
    for(let c = 0; c < cols; c++) {
      rowCells.push(cellNum--);
    }
    let rowFromBottom = rows - 1 - r;
    if (rowFromBottom % 2 === 0) rowCells.reverse();

    rowCells.forEach(num => {
      let div = document.createElement('div');
      div.className = 'cell';
      if(num === 1) div.classList.add('start-cell');
      if(num === maxPos) div.classList.add('end-cell');
      div.innerText = num;
      div.id = 'cell-' + num;
      board.appendChild(div);
    });
  }
}

function getCenter(pos) {
  const cell = document.getElementById('cell-' + pos);
  if(!cell) return null;
  const rect = cell.getBoundingClientRect();
  const boardRect = document.getElementById('board-surface').getBoundingClientRect();
  return {
    x: rect.left - boardRect.left + rect.width / 2,
    y: rect.top - boardRect.top + rect.height / 2,
    w: rect.width,
    h: rect.height
  };
}

/* ───────────────────────────────────────────────
   3D SNAKE RENDERER — full segmented tubular body
   ─────────────────────────────────────────────── */
function draw3DSnake(svg, c1, c2, palette, id) {
  // Build a cubic bezier path from tail (c2 = low pos) to head (c1 = high pos)
  const dx = c1.x - c2.x;
  const dy = c1.y - c2.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // Control points: two bows to make snake S-curve
  const perp = { x: -dy/dist, y: dx/dist };
  const bow = dist * 0.35;
  const cx1 = c2.x + dx*0.33 + perp.x*bow;
  const cy1 = c2.y + dy*0.33 + perp.y*bow;
  const cx2 = c2.x + dx*0.66 - perp.x*bow;
  const cy2 = c2.y + dy*0.66 - perp.y*bow;

  const pathD = `M ${c2.x} ${c2.y} C ${cx1} ${cy1} ${cx2} ${cy2} ${c1.x} ${c1.y}`;

  const snakeW = Math.max(10, Math.min(22, dist * 0.055));
  const headR  = snakeW * 0.72;
  const uid    = `snake_${id}`;

  // Sample points along bezier for scale pattern
  function bezierPoint(t) {
    const mt = 1 - t;
    return {
      x: mt*mt*mt*c2.x + 3*mt*mt*t*cx1 + 3*mt*t*t*cx2 + t*t*t*c1.x,
      y: mt*mt*mt*c2.y + 3*mt*mt*t*cy1 + 3*mt*t*t*cy2 + t*t*t*c1.y
    };
  }

  // Gradient defs for 3D tube illusion
  let defs = `
    <radialGradient id="${uid}_bg" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="${palette.belly}" stop-opacity="1"/>
      <stop offset="45%"  stop-color="${palette.body}"  stop-opacity="1"/>
      <stop offset="100%" stop-color="${palette.dark}"  stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="${uid}_shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="40%"  stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </linearGradient>
    <filter id="${uid}_glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="${uid}_shadow">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="${palette.dark}" flood-opacity="0.8"/>
    </filter>
  `;

  // ── SHADOW ──
  let shadow = `<path d="${pathD}" fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="${snakeW*2.2}" stroke-linecap="round" transform="translate(4,7)"/>`;

  // ── BODY BASE (dark outline) ──
  let bodyOutline = `<path d="${pathD}" fill="none" stroke="${palette.dark}" stroke-width="${snakeW*2+4}" stroke-linecap="round"/>`;

  // ── BODY MAIN ──
  let bodyMain = `<path d="${pathD}" fill="none" stroke="url(#${uid}_bg)" stroke-width="${snakeW*2}" stroke-linecap="round"/>`;

  // ── SCALE PATTERN — ellipses along the path ──
  let scales = '';
  const numScales = Math.floor(dist / (snakeW * 1.4));
  for(let i = 1; i < numScales; i++) {
    const t = i / numScales;
    const pt = bezierPoint(t);
    const pt2 = bezierPoint(Math.min(t + 0.02, 1));
    const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
    const scaleAlpha = 0.18 + (i % 2) * 0.1;
    scales += `<ellipse cx="${pt.x}" cy="${pt.y}" rx="${snakeW*0.85}" ry="${snakeW*0.5}"
      transform="rotate(${angle} ${pt.x} ${pt.y})"
      fill="none" stroke="${palette.stripe}" stroke-width="1.5" stroke-opacity="${scaleAlpha}"/>`;
    // Inner belly line
    scales += `<ellipse cx="${pt.x}" cy="${pt.y}" rx="${snakeW*0.45}" ry="${snakeW*0.22}"
      transform="rotate(${angle} ${pt.x} ${pt.y})"
      fill="${palette.belly}" fill-opacity="0.18"/>`;
  }

  // ── SHINE HIGHLIGHT ──
  let shine = `<path d="${pathD}" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="${snakeW*0.6}" stroke-linecap="round" stroke-dasharray="${snakeW*1.2} ${snakeW*0.8}"/>`;

  // ── HEAD ──
  // Head direction from last bezier tangent
  const ht = 0.97;
  const ht2 = 1.0;
  const p1h = bezierPoint(ht);
  const p2h = bezierPoint(ht2);
  const headAngle = Math.atan2(p2h.y - p1h.y, p2h.x - p1h.x) * 180 / Math.PI;

  let head = `
    <g transform="rotate(${headAngle} ${c1.x} ${c1.y})">
      <!-- Head base -->
      <ellipse cx="${c1.x}" cy="${c1.y}" rx="${headR*1.35}" ry="${headR}" fill="${palette.dark}"/>
      <ellipse cx="${c1.x}" cy="${c1.y}" rx="${headR*1.25}" ry="${headR*0.92}" fill="${palette.body}"/>
      <!-- Head shine -->
      <ellipse cx="${c1.x - headR*0.2}" cy="${c1.y - headR*0.25}" rx="${headR*0.55}" ry="${headR*0.3}"
        fill="rgba(255,255,255,0.35)"/>
      <!-- Nostrils -->
      <circle cx="${c1.x + headR*0.8}" cy="${c1.y - headR*0.35}" r="2.2" fill="${palette.dark}"/>
      <circle cx="${c1.x + headR*0.8}" cy="${c1.y + headR*0.35}" r="2.2" fill="${palette.dark}"/>
      <!-- Eyes -->
      <circle cx="${c1.x + headR*0.15}" cy="${c1.y - headR*0.55}" r="${headR*0.38}" fill="${palette.eye}" filter="url(#${uid}_glow)"/>
      <circle cx="${c1.x + headR*0.15}" cy="${c1.y - headR*0.55}" r="${headR*0.22}" fill="${palette.pupil}"/>
      <circle cx="${c1.x + headR*0.22}" cy="${c1.y - headR*0.62}" r="${headR*0.08}" fill="rgba(255,255,255,0.8)"/>
      <!-- Tongue fork -->
      <line x1="${c1.x + headR*1.25}" y1="${c1.y}"
            x2="${c1.x + headR*2.1}" y2="${c1.y - headR*0.55}"
            stroke="#ff3366" stroke-width="2" stroke-linecap="round"/>
      <line x1="${c1.x + headR*1.25}" y1="${c1.y}"
            x2="${c1.x + headR*2.1}" y2="${c1.y + headR*0.55}"
            stroke="#ff3366" stroke-width="2" stroke-linecap="round"/>
      <line x1="${c1.x + headR*1.05}" y1="${c1.y}"
            x2="${c1.x + headR*1.25}" y2="${c1.y}"
            stroke="#ff3366" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  `;

  // ── TAIL TIP ──
  const tt = 0.03;
  const tp = bezierPoint(tt);
  const tp2 = bezierPoint(0);
  const tailAngle = Math.atan2(tp2.y - tp.y, tp2.x - tp.x) * 180 / Math.PI;
  let tail = `<ellipse cx="${c2.x}" cy="${c2.y}" rx="${snakeW*0.55}" ry="${snakeW*0.45}"
    transform="rotate(${tailAngle} ${c2.x} ${c2.y})"
    fill="${palette.dark}"/>`;

  return `<defs>${defs}</defs>
    <g class="snake-scale-pattern" filter="url(#${uid}_shadow)">
      ${shadow}
      ${bodyOutline}
      ${bodyMain}
      ${scales}
      ${shine}
      ${tail}
      ${head}
    </g>`;
}

function draw3DLadder(svg, c1, c2) {
  const dx = c2.x - c1.x;
  const dy = c2.y - c1.y;
  const angle = Math.atan2(dy, dx);
  const dist = Math.sqrt(dx*dx + dy*dy);

  const railGap = 9;
  const offsetX = Math.cos(angle + Math.PI/2) * railGap;
  const offsetY = Math.sin(angle + Math.PI/2) * railGap;

  // Shadow
  let out = `<line x1="${c1.x-offsetX+4}" y1="${c1.y-offsetY+7}" x2="${c2.x-offsetX+4}" y2="${c2.y-offsetY+7}" stroke="rgba(0,0,0,0.5)" stroke-width="14" stroke-linecap="round"/>`;
  out += `<line x1="${c1.x+offsetX+4}" y1="${c1.y+offsetY+7}" x2="${c2.x+offsetX+4}" y2="${c2.y+offsetY+7}" stroke="rgba(0,0,0,0.5)" stroke-width="14" stroke-linecap="round"/>`;

  // Left rail
  out += `<line x1="${c1.x-offsetX}" y1="${c1.y-offsetY}" x2="${c2.x-offsetX}" y2="${c2.y-offsetY}" stroke="#b87333" stroke-width="8" stroke-linecap="round"/>`;
  out += `<line x1="${c1.x-offsetX}" y1="${c1.y-offsetY}" x2="${c2.x-offsetX}" y2="${c2.y-offsetY}" stroke="#f4c06d" stroke-width="5" stroke-linecap="round"/>`;

  // Right rail
  out += `<line x1="${c1.x+offsetX}" y1="${c1.y+offsetY}" x2="${c2.x+offsetX}" y2="${c2.y+offsetY}" stroke="#b87333" stroke-width="8" stroke-linecap="round"/>`;
  out += `<line x1="${c1.x+offsetX}" y1="${c1.y+offsetY}" x2="${c2.x+offsetX}" y2="${c2.y+offsetY}" stroke="#f4c06d" stroke-width="5" stroke-linecap="round"/>`;

  // Steps
  const steps = Math.max(3, Math.floor(dist / 16));
  for(let i=1; i<=steps; i++) {
    const px = c1.x + (dx * i / (steps+1));
    const py = c1.y + (dy * i / (steps+1));
    // Step shadow
    out += `<line x1="${px-offsetX+3}" y1="${py-offsetY+4}" x2="${px+offsetX+3}" y2="${py+offsetY+4}" stroke="rgba(0,0,0,0.4)" stroke-width="6" stroke-linecap="round"/>`;
    // Step base
    out += `<line x1="${px-offsetX}" y1="${py-offsetY}" x2="${px+offsetX}" y2="${py+offsetY}" stroke="#8b5e2a" stroke-width="6" stroke-linecap="round"/>`;
    // Step highlight
    out += `<line x1="${px-offsetX}" y1="${py-offsetY}" x2="${px+offsetX}" y2="${py+offsetY}" stroke="#f0d090" stroke-width="3.5" stroke-linecap="round"/>`;
  }

  // Glow dots at ends
  out += `<circle cx="${c1.x}" cy="${c1.y}" r="7" fill="#ffee88" opacity="0.7" filter="url(#ladderGlow)"/>`;
  out += `<circle cx="${c2.x}" cy="${c2.y}" r="7" fill="#ffee88" opacity="0.7" filter="url(#ladderGlow)"/>`;

  return out;
}

function drawSVG() {
  const svg = document.getElementById('svg-layer');
  let content = `
    <defs>
      <filter id="ladderGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>
  `;

  let snakeIdx = 0;
  for(let startStr in jumps) {
    let start = parseInt(startStr);
    let end = jumps[start];
    let isLadder = end > start;
    let c1 = getCenter(start);
    let c2 = getCenter(end);
    if(!c1 || !c2) continue;

    if(isLadder) {
      content += draw3DLadder(svg, c1, c2);
    } else {
      const palette = snakeColors[start] || snakePalettes[0];
      content += draw3DSnake(svg, c1, c2, palette, snakeIdx++);
    }
  }

  svg.innerHTML = content;
}

function updatePlayerPos() {
  const coords = getCenter(currentPos);
  if (!coords) return null;
  const player = document.getElementById('player');
  player.style.left = coords.x + 'px';
  player.style.top = coords.y + 'px';
  return coords;
}

function spawnParticles(x, y, type) {
  const board = document.getElementById('board-surface');
  const colors = type === 'ladder'
    ? ['#ff00ff','#00f5ff','#ccff00','#fff','#ffaa00']
    : ['#00ff88','#ff3366','#33ff33','#ccff00','#ff0000'];

  for(let i=0; i<22; i++) {
    let p = document.createElement('div');
    p.className = 'particle';
    p.style.width = Math.random() * 9 + 4 + 'px';
    p.style.height = p.style.width;
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.boxShadow = `0 0 10px ${p.style.background}`;
    p.style.setProperty('--tx', `${(Math.random()-0.5)*160}px`);
    p.style.setProperty('--ty', `${(Math.random()-0.5)*160}px`);
    board.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function changeLevel() {
  if (isAnimating) return;
  currentLevel = parseInt(document.getElementById('levelSelect').value);
  maxPos = levels[currentLevel].max;
  currentPos = 1;
  rolls = 0; snakes = 0; ladders = 0;

  updateStats();
  document.getElementById('message').innerText = "Board generated. Ready to roll!";
  document.getElementById('rollBtn').disabled = false;

  renderBoard();
  generateJumps();

  setTimeout(() => {
    updatePlayerPos();
    drawSVG();
  }, 60);
}

async function playTurn() {
  if(isAnimating) return;
  isAnimating = true;
  document.getElementById('rollBtn').disabled = true;

  if (!actx) actx = new AC();

  playTone(400, 'square', 0.1);
  let diceVal = Math.floor(Math.random() * 6) + 1;
  rolls++;
  updateStats();

  const cube = document.getElementById('dice-cube');
  cube.classList.remove('rolling');
  void cube.offsetWidth;
  cube.style.setProperty('--final-transform', diceTransforms[diceVal]);
  cube.classList.add('rolling');

  document.getElementById('message').innerText = `Rolling...`;
  await new Promise(r => setTimeout(r, 800));

  playTone(600, 'sine', 0.2);
  document.getElementById('message').innerText = `Rolled a ${diceVal}!`;

  for(let i=0; i<diceVal; i++) {
    if(currentPos >= maxPos) break;
    currentPos++;
    playTone(300 + (i*50), 'triangle', 0.1);

    const player = document.getElementById('player');
    player.classList.add('jumping');

    const cell = document.getElementById('cell-' + currentPos);
    if(cell) {
      cell.classList.add('highlight');
      setTimeout(() => cell.classList.remove('highlight'), 500);
    }

    let coords = updatePlayerPos();

    if(coords) {
      let trail = document.createElement('div');
      trail.className = 'token-trail';
      trail.style.left = coords.x + 'px';
      trail.style.top = coords.y + 'px';
      document.getElementById('player-scene').appendChild(trail);
      setTimeout(() => trail.remove(), 600);
    }

    await new Promise(r => setTimeout(r, 360));
    player.classList.remove('jumping');
  }

  updateStats();

  if(currentPos === maxPos) {
    document.getElementById('message').innerText = `🎉 YOU BEAT LEVEL ${currentLevel}! 🎉`;
    playTone(500, 'sine', 0.2);
    setTimeout(()=>playTone(600, 'sine', 0.2), 200);
    setTimeout(()=>playTone(800, 'sine', 0.4), 400);
    let coords = updatePlayerPos();
    if(coords) spawnParticles(coords.x, coords.y, 'ladder');
    isAnimating = false;
    return;
  }

  if(jumps[currentPos]) {
    let end = jumps[currentPos];
    let isLadder = end > currentPos;
    await new Promise(r => setTimeout(r, 420));

    if(isLadder) {
      ladders++;
      document.getElementById('message').innerText = `🪜 MEGA JUMP up to ${end}!`;
      playTone(800, 'sine', 0.5, 0.15);
      let coords = getCenter(currentPos);
      if(coords) spawnParticles(coords.x, coords.y, 'ladder');
    } else {
      snakes++;
      document.getElementById('message').innerText = `🐍 POISON! Slid down to ${end}`;
      playTone(150, 'sawtooth', 0.7, 0.2);
      let boardSurface = document.getElementById('board-surface');
      boardSurface.classList.add('shake');
      setTimeout(() => boardSurface.classList.remove('shake'), 500);
      let coords = getCenter(currentPos);
      if(coords) spawnParticles(coords.x, coords.y, 'snake');
    }

    currentPos = end;
    updatePlayerPos();
    updateStats();
  }

  isAnimating = false;
  document.getElementById('rollBtn').disabled = false;
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    updatePlayerPos();
    drawSVG();
  }, 100);
});

document.getElementById('dice-scene').addEventListener('click', () => {
  if (!isAnimating && !document.getElementById('rollBtn').disabled) playTurn();
});

window.onload = changeLevel;
</script>
</body>
</html>
