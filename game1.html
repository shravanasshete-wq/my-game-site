<!DOCTYPE html>
<html>
<head>
<title>🎯 Balloon Shooter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  cursor:crosshair;
  background: linear-gradient(#87CEEB, #ffffff);
}

/* LOGIN + GAME OVER */
.loginCard {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

.loginCard input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:200px;
  margin:10px;
}

.loginCard button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#ff5722;
  color:white;
}

/* GAME */
#gameArea {
  height:100vh;
  position:relative;
  display:none;
}

#topBar {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:8px 15px;
  border-radius:10px;
}

#speedBox {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px;
  border-radius:10px;
}

/* BALLOONS */
.balloon {
  width:60px;
  height:80px;
  border-radius:50%;
  position:absolute;
}
.red{background:red;}
.blue{background:blue;}
.green{background:green;}
.yellow{background:gold;}

/* FLOAT TEXT */
.floatingText {
  position:absolute;
  font-weight:bold;
  font-size:20px;
  animation:floatUp 1s forwards;
}

@keyframes floatUp {
  to { transform:translateY(-60px); opacity:0; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="loginCard">
  <h2>🎮 Balloon Shooter</h2>
  <input id="playerName" placeholder="Your name"><br>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="gameArea">
  <div id="topBar"></div>

  <div id="speedBox">
    <div id="speedLabel">🐢 Easy</div>
    <input type="range" min="1" max="5" value="1" id="speedControl" onchange="changeSpeed()">
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="loginCard" style="display:none;">
  <h2>🏆 Game Over</h2>
  <div id="finalText"></div>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>

let name="", score=0, lives=3, time=60;
let spawnDelay=2500, riseSpeed=0.8;
let combo=0, lastPop=0;

/* 🎵 AUDIO (FIXED) */
let bgMusic = new Audio();
bgMusic.src = "https://assets.mixkit.co/music/preview/mixkit-happy-kids-background-622.mp3";
bgMusic.loop = true;
bgMusic.volume = 0.2;

function playPopSound(){
  let pop = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-2357.mp3");
  pop.volume = 1;
  pop.play().catch(()=>{});
}

/* LOAD NAME */
window.onload = function(){
  let saved = localStorage.getItem("playerName");
  if(saved) document.getElementById("playerName").value = saved;
};

/* SPEED */
function changeSpeed(){
  let level=document.getElementById("speedControl").value;
  const labels=["🐢 Easy","🚶 Normal","🏃 Fast","⚡ Crazy","🚀 Turbo"];
  document.getElementById("speedLabel").innerText=labels[level-1];

  if(level==1){spawnDelay=2500;riseSpeed=0.8;}
  if(level==2){spawnDelay=2000;riseSpeed=1.2;}
  if(level==3){spawnDelay=1500;riseSpeed=2;}
  if(level==4){spawnDelay=1000;riseSpeed=3;}
  if(level==5){spawnDelay=600;riseSpeed=4;}
}

/* START GAME */
function startGame(){
  name=document.getElementById("playerName").value || "Player";
  localStorage.setItem("playerName", name);

  login.style.display="none";
  gameArea.style.display="block";

  // 🔥 Force play music
  bgMusic.play().then(()=>{
    console.log("Music playing");
  }).catch(()=>{
    console.log("Tap again if blocked");
  });

  setInterval(updateTimer,1000);
  setInterval(createBalloon,spawnDelay);
}

/* TIMER */
function updateTimer(){
  time--;
  updateInfo();
  if(time<=0) endGame();
}

/* INFO */
function updateInfo(){
  topBar.innerText =
    "👤 "+name+" | 🎯 "+score+" | ❤️ "+lives+" | ⏱ "+time;
}

/* FLOAT TEXT */
function showText(x,y,text,color){
  let t=document.createElement("div");
  t.className="floatingText";
  t.innerText=text;
  t.style.left=x+"px";
  t.style.top=y+"px";
  t.style.color=color;
  gameArea.appendChild(t);
  setTimeout(()=>t.remove(),1000);
}

/* BALLOON */
function createBalloon(){
  const b=document.createElement("div");
  b.className="balloon "+["red","blue","green","yellow"][Math.floor(Math.random()*4)];
  b.style.left=Math.random()*90+"%";
  b.style.top="100%";

  gameArea.appendChild(b);

  let move=setInterval(()=>{
    let top=parseFloat(b.style.top);
    if(top<0){
      b.remove();
      lives--;
      updateInfo();
      if(lives<=0) endGame();
      clearInterval(move);
    } else {
      b.style.top=(top-riseSpeed)+"%";
    }
  },60);

  function pop(){
    let now=Date.now();
    combo = (now-lastPop<800)? combo+1 : 1;
    lastPop=now;

    score++;

    // 🔊 POP SOUND
    playPopSound();

    let text="WOW!", color="black";
    if(combo>=5){text="AWESOME!";color="purple";}
    else if(combo>=3){text="CRAZY!";color="red";}

    showText(b.offsetLeft, b.offsetTop, text, color);

    b.remove();
    clearInterval(move);
    updateInfo();
  }

  b.onclick=pop;
  b.ontouchstart=pop;
}

/* END GAME */
function endGame(){
  bgMusic.pause();

  gameArea.style.display="none";
  gameOver.style.display="block";

  finalText.innerHTML =
    "👤 "+name+"<br>🎯 Score: "+score;
}

</script>

</body>
</html>
