<!DOCTYPE html>
<html>
<head>
<title>🎯 Balloon Shooter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  cursor:crosshair;
  background: linear-gradient(#87CEEB, #ffffff);
}

.loginCard {
  position: fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:25px;
  border-radius:20px;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.loginCard input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:200px;
}

.loginCard button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff5722;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

#gameArea {
  height:100vh;
  position:relative;
  display:none;
  overflow:hidden; /* Added so floating balloons don't create scrollbars */
}

#topBar {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:8px;
  border-radius:10px;
  z-index: 10;
}

#speedBox {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px;
  border-radius:10px;
  z-index: 10;
}

.balloon {
  width:60px;
  height:80px;
  border-radius:50%;
  position:absolute;
}
.red{background:red;}
.blue{background:blue;}
.green{background:green;}
.yellow{background:gold;}

.floatingText {
  position:absolute;
  font-weight:bold;
  animation:floatUp 1s forwards;
  pointer-events:none; /* Prevents text from blocking balloon clicks */
}
@keyframes floatUp {
  to {transform:translateY(-60px);opacity:0;}
}
</style>
</head>

<body>

<!-- SOUND EFFECTS -->
<audio id="popSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-2357.mp3" type="audio/mpeg">
</audio>

<!-- LOGIN -->
<div id="login" class="loginCard">
  <h2>🎮 Balloon Shooter</h2>
  <input id="playerName" placeholder="Your name"><br><br>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="gameArea">
  <div id="topBar"></div>

  <div id="speedBox">
    <div id="speedLabel">🐢 Easy</div>
    <input type="range" min="1" max="5" value="1" id="speedControl" onchange="changeSpeed()">
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="loginCard" style="display:none;">
  <h2>🏆 Game Over</h2>
  <div id="finalText"></div>
  <br>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>

let name="", score=0, lives=3, time=60;
let spawnDelay=2500, riseSpeed=0.8;
let combo=0, lastPop=0;
let gameInterval, spawnInterval;

const popSound = document.getElementById("popSound");

// Fix volumes
popSound.volume = 1;

// 👤 Load saved name
window.onload = function(){
  let saved = localStorage.getItem("playerName");
  if(saved) document.getElementById("playerName").value = saved;
};

function changeSpeed(){
  let level = document.getElementById("speedControl").value;
  const labels = ["🐢 Easy","🚶 Normal","🏃 Fast","⚡ Crazy","🚀 Turbo"];
  document.getElementById("speedLabel").innerText = labels[level-1];

  if(level==1){spawnDelay=2500;riseSpeed=0.8;}
  if(level==2){spawnDelay=2000;riseSpeed=1.2;}
  if(level==3){spawnDelay=1500;riseSpeed=2;}
  if(level==4){spawnDelay=1000;riseSpeed=3;}
  if(level==5){spawnDelay=600;riseSpeed=4;}
  
  // Dynamically update spawn speed if the game is actively running
  if(document.getElementById("gameArea").style.display === "block" && time > 0) {
      clearInterval(spawnInterval);
      spawnInterval = setInterval(createBalloon, spawnDelay);
  }
}

function startGame(){
  name = document.getElementById("playerName").value || "Player";
  localStorage.setItem("playerName", name);

  document.getElementById("login").style.display="none";
  document.getElementById("gameArea").style.display="block";

  updateInfo();
  gameInterval = setInterval(updateTimer,1000);
  spawnInterval = setInterval(createBalloon,spawnDelay);
}

function updateTimer(){
  time--;
  updateInfo();
  if(time<=0) endGame();
}

function updateInfo(){
  document.getElementById("topBar").innerText =
    "👤 "+name+" | 🎯 "+score+" | ❤️ "+lives+" | ⏱ "+time;
}

function showText(x,y,text,color){
  let t=document.createElement("div");
  t.className="floatingText";
  t.innerText=text;
  t.style.left=x+"px";
  t.style.top=y+"px";
  t.style.color=color;
  document.getElementById("gameArea").appendChild(t);
  setTimeout(()=>t.remove(),1000);
}

function createBalloon(){
  const b=document.createElement("div");
  b.className="balloon "+["red","blue","green","yellow"][Math.floor(Math.random()*4)];
  b.style.left=Math.random()*90+"%";
  b.style.top="100%";

  document.getElementById("gameArea").appendChild(b);

  let move=setInterval(()=>{
    let top=parseFloat(b.style.top);
    if(top<0){
      b.remove();
      lives--;
      updateInfo();
      if(lives<=0) endGame();
      clearInterval(move);
    } else {
      b.style.top=(top-riseSpeed)+"%";
    }
  },60);

  function pop(e){
    if(e) e.preventDefault(); // Prevents touch from double-firing

    let now=Date.now();
    combo = (now-lastPop<800)? combo+1 : 1;
    lastPop=now;

    score++;

    // 🔊 POP SOUND
    popSound.currentTime = 0;
    popSound.play().catch(()=>{});

    let text="WOW!", color="black";
    if(combo>=5){text="AWESOME!";color="purple";}
    else if(combo>=3){text="CRAZY!";color="red";}

    showText(b.offsetLeft,b.offsetTop,text,color);

    b.remove();
    clearInterval(move);
    updateInfo();
  }

  b.onmousedown=pop;
  b.ontouchstart=pop;
}

function endGame(){
  clearInterval(gameInterval); // Stops the timer in the background
  clearInterval(spawnInterval); // Stops new balloons from spawning

  document.getElementById("gameArea").style.display="none";
  document.getElementById("gameOver").style.display="block";

  document.getElementById("finalText").innerHTML =
    "👤 "+name+"<br>🎯 Score: "+score;
}

</script>

</body>
</html>
