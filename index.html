<!DOCTYPE html>
<html>
<head>
  <title>Kids Game Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
    }

    h1 { margin-top: 30px; }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 400px;
      margin: auto;
      margin-top: 40px;
    }

    a { text-decoration: none; }

    .btn {
      padding: 20px;
      font-size: 18px;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      display: block;
    }

    .btn:hover { background: #45a049; }
  </style>
</head>

<body>

<h1>🎮 Kids Game Hub</h1>
<p>Select a Game</p>

<div class="container">
  <a href="game1.html"><div class="btn">🎈 Balloon Game</div></a>
  <a href="game2.html"><div class="btn">🧩 Memory Game</div></a>
  <a href="game3.html"><div class="btn">🐱 Catch Game</div></a>
  <a href="game4.html"><div class="btn">🎯 Quiz Game</div></a>
  <a href="game5.html"><div class="btn">🏃 Runner Game</div></a>
  <a href="game6.html"><div class="btn">🧱 Tower Game</div></a>
</div>

</body>
</html>
