<!DOCTYPE html>
<html>
<head>
  <title>Balloon Shooter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(#87CEEB, #ffffff);
      text-align: center;

      /* 🎯 Reliable shooting cursor */
      cursor: crosshair;
    }

    h2 { margin: 10px; }

    #score {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .controls {
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 4px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .active {
      background: #ff5722;
    }

    .balloon {
      width: 60px;
      height: 80px;
      border-radius: 50%;
      position: absolute;
      /* Show pointer when over balloon */
      cursor: pointer;
    }

    .red { background: red; }
    .blue { background: blue; }
    .green { background: green; }
    .yellow { background: gold; }

    a {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 6px 10px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>

<body>

<a href="index.html">⬅ Back</a>

<h2>🎈 Balloon Shooter</h2>
<div id="score">Score: 0</div>

<div class="controls">
  Speed:
  <button id="low" onclick="setSpeed(event, 2000)">Low</button>
  <button onclick="setSpeed(event, 1200)">Medium</button>
  <button onclick="setSpeed(event, 600)">High</button>
</div>

<script>
let score = 0;

/* VERY SLOW default (slow-motion) */
let spawnDelay = 2000;
let riseSpeed = 1.5; // px per tick
let gameInterval;

/* highlight default button */
document.getElementById("low").classList.add("active");

function setSpeed(e, delay) {
  spawnDelay = delay;

  // adjust rise speed with level
  if (delay === 2000) riseSpeed = 1.5;     // Low (slowest)
  else if (delay === 1200) riseSpeed = 2.5; // Medium
  else riseSpeed = 4;                       // High

  clearInterval(gameInterval);
  gameInterval = setInterval(createBalloon, spawnDelay);

  // update active button
  document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");
}

function createBalloon() {
  const b = document.createElement("div");
  b.className = "balloon";

  const colors = ["red","blue","green","yellow"];
  b.classList.add(colors[Math.floor(Math.random() * colors.length)]);

  b.style.left = Math.random() * (window.innerWidth - 60) + "px";
  b.style.top = window.innerHeight + "px";

  document.body.appendChild(b);

  let move = setInterval(() => {
    let top = parseFloat(b.style.top);
    if (top < -100) {
      b.remove();
      clearInterval(move);
    } else {
      b.style.top = (top - riseSpeed) + "px";
    }
  }, 30);

  function pop() {
    score++;
    document.getElementById("score").innerText = "Score: " + score;

    // clean remove (no glitch/burst)
    b.remove();
    clearInterval(move);
  }

  // support both desktop + mobile
  b.addEventListener("click", pop);
  b.addEventListener("touchstart", pop);
}

/* start game */
gameInterval = setInterval(createBalloon, spawnDelay);
</script>

</body>
</html>
