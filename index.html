<!DOCTYPE html>
<html>
<head>
  <title>Balloon Pop Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to top, #87CEEB, #ffffff);
      text-align: center;
    }

    h1 {
      margin: 10px;
    }

    #score, #timer {
      font-size: 20px;
      margin: 5px;
    }

    .balloon {
      width: 60px;
      height: 80px;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
    }

    .red { background: red; }
    .blue { background: blue; }
    .green { background: green; }
    .yellow { background: gold; }

    #gameOver {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30px;
      display: none;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎈 Balloon Pop Game</h1>
<div id="score">Score: 0</div>
<div id="timer">Time: 30</div>

<div id="gameOver">
  Game Over!<br>
  <span id="finalScore"></span><br>
  <button onclick="startGame()">Restart</button>
</div>

<script>
let score = 0;
let timeLeft = 30;
let gameInterval;
let timerInterval;

function startGame() {
  score = 0;
  timeLeft = 30;
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("timer").innerText = "Time: " + timeLeft;
  document.getElementById("gameOver").style.display = "none";

  clearInterval(gameInterval);
  clearInterval(timerInterval);

  gameInterval = setInterval(createBalloon, 800);
  timerInterval = setInterval(updateTimer, 1000);
}

function createBalloon() {
  const balloon = document.createElement("div");
  balloon.classList.add("balloon");

  const colors = ["red", "blue", "green", "yellow"];
  balloon.classList.add(colors[Math.floor(Math.random() * colors.length)]);

  balloon.style.left = Math.random() * (window.innerWidth - 60) + "px";
  balloon.style.top = window.innerHeight + "px";

  document.body.appendChild(balloon);

  let move = setInterval(() => {
    let top = parseInt(balloon.style.top);
    if (top < -100) {
      balloon.remove();
      clearInterval(move);
    } else {
      balloon.style.top = (top - 3) + "px";
    }
  }, 20);

  balloon.onclick = () => {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    balloon.remove();
    clearInterval(move);
  };
}

function updateTimer() {
  timeLeft--;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  if (timeLeft <= 0) {
    clearInterval(gameInterval);
    clearInterval(timerInterval);
    document.getElementById("finalScore").innerText = "Your Score: " + score;
    document.getElementById("gameOver").style.display = "block";
  }
}

// Start game automatically
startGame();
</script>

</body>
</html>
