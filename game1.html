<!DOCTYPE html>
<html>
<head>
  <title>Balloon Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      background: skyblue;
    }

    h2 { margin: 10px; }

    #score {
      font-size: 20px;
    }

    .balloon {
      width: 60px;
      height: 80px;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
    }

    .red { background: red; }
    .blue { background: blue; }
    .green { background: green; }
    .yellow { background: gold; }

    a {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 5px 10px;
      border-radius: 5px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<a href="index.html">⬅ Back</a>

<h2>🎈 Balloon Game</h2>
<div id="score">Score: 0</div>

<script>
let score = 0;

function createBalloon() {
  const b = document.createElement("div");
  b.className = "balloon";

  const colors = ["red","blue","green","yellow"];
  b.classList.add(colors[Math.floor(Math.random()*4)]);

  b.style.left = Math.random() * (window.innerWidth - 60) + "px";
  b.style.top = window.innerHeight + "px";

  document.body.appendChild(b);

  let move = setInterval(() => {
    let top = parseFloat(b.style.top);
    if (top < -100) {
      b.remove();
      clearInterval(move);
    } else {
      b.style.top = (top - 4) + "px";
    }
  }, 20);

  function pop() {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    b.remove();
    clearInterval(move);
  }

  b.addEventListener("click", pop);
  b.addEventListener("touchstart", pop);
}

setInterval(createBalloon, 800);
</script>

</body>
</html>
