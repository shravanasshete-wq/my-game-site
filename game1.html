<!DOCTYPE html>
<html>
<head>
  <title>🎯 Balloon Shooter Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(#87CEEB, #ffffff);
      text-align: center;
      cursor: crosshair;
    }

    h2 { margin: 10px; }

    #score, #highScore {
      font-size: 18px;
      margin: 5px;
    }

    .controls {
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 4px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .active {
      background: #ff5722;
    }

    .balloon {
      width: 60px;
      height: 80px;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
    }

    .red { background: red; }
    .blue { background: blue; }
    .green { background: green; }
    .yellow { background: gold; }

    a {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 6px 10px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>

<body>

<a href="index.html">⬅ Back</a>

<h2>🎯 Balloon Shooter Challenge</h2>
<div id="score">Score: 0</div>
<div id="highScore">High Score: 0</div>

<div class="controls">
  Speed:
  <button id="easy" onclick="setSpeed(event, 2200)">🐢 Easy</button>
  <button onclick="setSpeed(event, 1400)">🚶 Normal</button>
  <button onclick="setSpeed(event, 800)">🏃 Fast</button>
  <button onclick="setSpeed(event, 500)">⚡ Crazy</button>
  <button onclick="setSpeed(event, 250)">🚀 Turbo</button>
</div>

<script>
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let spawnDelay = 2200;
let riseSpeed = 1.2;
let gameInterval;

let lastPopTime = 0;
let comboCount = 0;

document.getElementById("highScore").innerText = "High Score: " + highScore;
document.getElementById("easy").classList.add("active");

function setSpeed(e, delay) {
  spawnDelay = delay;

  if (delay === 2200) riseSpeed = 1.2;
  else if (delay === 1400) riseSpeed = 2;
  else if (delay === 800) riseSpeed = 3;
  else if (delay === 500) riseSpeed = 4.5;
  else riseSpeed = 6;

  clearInterval(gameInterval);
  gameInterval = setInterval(createBalloon, spawnDelay);

  document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");
}

// 🔊 Reliable sound (browser-friendly)
function playSound() {
  let audio = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
  audio.play();
}

function createBalloon() {
  const b = document.createElement("div");
  b.className = "balloon";

  const colors = ["red","blue","green","yellow"];
  b.classList.add(colors[Math.floor(Math.random() * colors.length)]);

  b.style.left = Math.random() * (window.innerWidth - 60) + "px";
  b.style.top = window.innerHeight + "px";

  document.body.appendChild(b);

  let move = setInterval(() => {
    let top = parseFloat(b.style.top);
    if (top < -100) {
      b.remove();
      clearInterval(move);
    } else {
      b.style.top = (top - riseSpeed) + "px";
    }
  }, 30);

  function pop() {
    let now = Date.now();

    // 💥 Combo logic
    if (now - lastPopTime < 800) {
      comboCount++;
    } else {
      comboCount = 1;
    }

    lastPopTime = now;

    let points = comboCount >= 3 ? 2 : 1;
    score += points;

    document.getElementById("score").innerText = "Score: " + score;

    playSound();

    // 🏆 High score save
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
      document.getElementById("highScore").innerText = "High Score: " + highScore;
    }

    b.remove();
    clearInterval(move);
  }

  b.addEventListener("click", pop);
  b.addEventListener("touchstart", pop);
}

// start game
gameInterval = setInterval(createBalloon, spawnDelay);
</script>

</body>
</html>
