<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Snakes & Ladders 3D Ultra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Rajdhani:wght@500;700&family=Orbitron:wght@700;900&display=swap');

:root {
  --mango-light: #FFC324;
  --mango-dark: #FF8243;
  --neon-blue: #00f5ff;
  --neon-pink: #ff00ff;
  --neon-yellow: #ccff00;
  --neon-green: #00ff88;
  --bg-dark: #0a0e1a;
  --cell-light: #1e2a42;
  --cell-dark: #141c2e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,0,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255,195,36,0.1) 0%, transparent 50%);
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background:
    linear-gradient(45deg, transparent 30%, rgba(0,245,255,0.03) 50%, transparent 70%),
    linear-gradient(-45deg, transparent 30%, rgba(255,0,255,0.03) 50%, transparent 70%);
  animation: aurora 15s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes aurora {
  0%, 100% { transform: translateX(-10%) skewX(0deg); }
  50% { transform: translateX(10%) skewX(5deg); }
}

header {
  background: linear-gradient(135deg, var(--mango-light), var(--neon-pink), var(--mango-dark));
  background-size: 200% 200%;
  animation: gradientShift 3s ease infinite;
  color: #000;
  text-align: center;
  padding: 10px 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  box-shadow: 0 4px 30px rgba(255,130,67,0.6), 0 0 60px rgba(255,0,255,0.3);
  z-index: 100;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.8);
  position: relative;
  flex-shrink: 0;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

footer {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--mango-light));
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
  color: #000;
  text-align: center;
  padding: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  flex-shrink: 0;
  z-index: 100;
}

#main-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding: 8px;
  gap: 10px;
  position: relative;
  z-index: 1;
  min-height: 0;
}

/* ── SIDE PANEL ── */
#side-panel {
  width: 200px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.6);
  border: 2px solid rgba(0,245,255,0.4);
  box-shadow: 0 0 30px rgba(0,245,255,0.25), inset 0 0 30px rgba(255,0,255,0.08);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  backdrop-filter: blur(16px);
  animation: panelGlow 3s ease-in-out infinite;
  overflow: hidden;
}

@keyframes panelGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(0,245,255,0.25), inset 0 0 30px rgba(255,0,255,0.08); }
  50% { box-shadow: 0 0 40px rgba(255,0,255,0.3), inset 0 0 40px rgba(0,245,255,0.1); }
}

.panel-section { text-align: center; }
.panel-label {
  color: var(--neon-blue);
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 3px;
  font-size: 11px;
  margin-bottom: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--neon-blue);
}

select {
  width: 100%;
  padding: 8px 10px;
  background: rgba(0,0,0,0.8);
  color: var(--neon-yellow);
  border: 2px solid var(--neon-pink);
  border-radius: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  outline: none;
  box-shadow: 0 0 15px rgba(255,0,255,0.2);
  transition: all 0.3s;
}
select:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0,245,255,0.4);
}

.info-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  padding: 3px 0;
}
.info-val {
  color: var(--neon-yellow);
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  text-shadow: 0 0 10px var(--neon-yellow);
}

/* ── 3D DICE ── */
#dice-scene {
  perspective: 300px;
  width: 80px;
  height: 80px;
  margin: 0 auto 8px;
  cursor: pointer;
  filter: drop-shadow(0 0 20px rgba(0,245,255,0.5));
}
#dice-cube {
  width: 80px;
  height: 80px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(-25deg) rotateY(20deg);
  transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#dice-cube.rolling {
  animation: diceRoll 0.8s ease-in-out;
}
@keyframes diceRoll {
  0% { transform: rotateX(-25deg) rotateY(20deg) rotateZ(0deg); }
  20% { transform: rotateX(180deg) rotateY(120deg) rotateZ(90deg); }
  40% { transform: rotateX(360deg) rotateY(240deg) rotateZ(180deg); }
  60% { transform: rotateX(540deg) rotateY(360deg) rotateZ(270deg); }
  80% { transform: rotateX(680deg) rotateY(480deg) rotateZ(315deg); }
  100% { transform: var(--final-transform); }
}
.dice-face {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 14px;
  display: grid;
  padding: 10px;
  gap: 4px;
  border: 3px solid #ddd;
  box-shadow:
    inset 0 0 15px rgba(0,0,0,0.1),
    inset 0 0 30px rgba(255,255,255,0.8),
    0 0 20px rgba(0,245,255,0.3);
}
.dice-face.f1 { transform: translateZ(40px); }
.dice-face.f2 { transform: rotateY(180deg) translateZ(40px); }
.dice-face.f3 { transform: rotateY(90deg) translateZ(40px); }
.dice-face.f4 { transform: rotateY(-90deg) translateZ(40px); }
.dice-face.f5 { transform: rotateX(90deg) translateZ(40px); }
.dice-face.f6 { transform: rotateX(-90deg) translateZ(40px); }

.dot {
  width: 12px; height: 12px;
  background: radial-gradient(circle at 30% 30%, #333, #000);
  border-radius: 50%;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.4), inset 1px 1px 2px rgba(255,255,255,0.2);
}
.face-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; place-items: center; }
.face-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.face-2.dot:nth-child(1) { grid-column:1; grid-row:1; align-self:start; justify-self:start; }
.face-2.dot:nth-child(2) { grid-column:2; grid-row:2; align-self:end; justify-self:end; }
.face-3 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
.face-3.dot:nth-child(1) { grid-column:1; grid-row:1; }
.face-3.dot:nth-child(2) { grid-column:2; grid-row:2; place-self:center; }
.face-3.dot:nth-child(3) { grid-column:3; grid-row:3; align-self:end; justify-self:end; }
.face-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.face-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
.face-5.dot:nth-child(1) { grid-column:1; grid-row:1; }
.face-5.dot:nth-child(2) { grid-column:3; grid-row:1; }
.face-5.dot:nth-child(3) { grid-column:2; grid-row:2; place-self:center; }
.face-5.dot:nth-child(4) { grid-column:1; grid-row:3; }
.face-5.dot:nth-child(5) { grid-column:3; grid-row:3; }
.face-6 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }

.dice-face.f1 { background: linear-gradient(145deg, #fff, #ffe0e0); }
.dice-face.f2 { background: linear-gradient(145deg, #fff, #e0ffe0); }
.dice-face.f3 { background: linear-gradient(145deg, #fff, #e0e0ff); }
.dice-face.f4 { background: linear-gradient(145deg, #fff, #ffe0ff); }
.dice-face.f5 { background: linear-gradient(145deg, #fff, #ffffe0); }
.dice-face.f6 { background: linear-gradient(145deg, #fff, #e0ffff); }

#message {
  color: var(--neon-yellow);
  font-weight: 700;
  font-size: 14px;
  min-height: 36px;
  line-height: 1.3;
  font-family: 'Rajdhani', sans-serif;
  text-shadow: 0 0 15px var(--neon-yellow);
  animation: msgPulse 2s ease-in-out infinite;
  text-align: center;
}

@keyframes msgPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.btn {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 4px 25px rgba(0,245,255,0.5), 0 0 40px rgba(255,0,255,0.3);
  transition: transform 0.1s, filter 0.2s, box-shadow 0.2s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%; width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(45deg);
  animation: btnShine 3s infinite;
}
@keyframes btnShine {
  0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
  100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}
.btn:hover {
  filter: brightness(1.3);
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 6px 30px rgba(0,245,255,0.7), 0 0 60px rgba(255,0,255,0.5);
}
.btn:active { transform: translateY(2px) scale(0.98); }
.btn:disabled {
  background: #2a3040;
  color: #5a6080;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}
.btn:disabled::before { display: none; }

.btn-new {
  background: linear-gradient(135deg, var(--mango-light), var(--neon-green));
  color: #000;
  box-shadow: 0 4px 25px rgba(255,195,36,0.5), 0 0 40px rgba(0,255,136,0.3);
  font-size: 13px;
  padding: 9px;
}

/* ── BOARD AREA — BIGGER ── */
#board-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
}

#board-wrapper {
  width: min(100%, calc(100vh - 100px));
  height: min(100%, calc(100vh - 100px));
  aspect-ratio: 1 / 1;
  position: relative;
  flex-shrink: 0;
}

#board-surface {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0f1628, #1a2340);
  border-radius: 10px;
  border: 3px solid;
  border-image: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--mango-light)) 1;
  box-shadow:
    0 0 0 1px rgba(0,245,255,0.4),
    0 20px 60px rgba(0,0,0,0.9),
    0 0 60px rgba(0,245,255,0.2),
    0 0 100px rgba(255,0,255,0.1);
  position: relative;
  overflow: hidden;
}

#board {
  display: grid;
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: 7px;
  overflow: hidden;
}

/* ── CELLS ── */
.cell {
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 3px 4px;
  font-size: clamp(6px, 1vw, 12px);
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  color: rgba(255,255,255,0.25);
  position: relative;
  background: var(--cell-dark);
  transition: all 0.3s;
}
.cell:nth-child(even) { background: var(--cell-light); }
.cell.start-cell {
  background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(0,245,255,0.05))!important;
  color: var(--neon-blue)!important;
  box-shadow: inset 0 0 15px rgba(0,245,255,0.3);
  animation: startPulse 2s ease-in-out infinite;
}
@keyframes startPulse {
  0%, 100% { box-shadow: inset 0 0 15px rgba(0,245,255,0.3); }
  50% { box-shadow: inset 0 0 25px rgba(0,245,255,0.5); }
}
.cell.end-cell {
  background: linear-gradient(135deg, rgba(255,195,36,0.3), rgba(255,130,67,0.15))!important;
  color: var(--mango-light)!important;
  box-shadow: inset 0 0 20px rgba(255,195,36,0.4);
  animation: endPulse 2s ease-in-out infinite;
}
@keyframes endPulse {
  0%, 100% { box-shadow: inset 0 0 20px rgba(255,195,36,0.4); }
  50% { box-shadow: inset 0 0 35px rgba(255,195,36,0.7); }
}
.cell.highlight {
  background: rgba(204,255,0,0.25)!important;
  animation: highlightFlash 0.5s ease;
}
@keyframes highlightFlash {
  0%, 100% { background: rgba(204,255,0,0.2)!important; }
  50% { background: rgba(204,255,0,0.45)!important; }
}

/* ── SVG OVERLAY ── */
#svg-layer {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  overflow: visible;
}

/* ── PLAYER TOKEN ── */
#player-scene {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 50;
  pointer-events: none;
}
#player {
  width: 36px;
  height: 42px;
  position: absolute;
  transform: translate(-18px, -42px);
  transition: left 0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
              top 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.9));
}
.token-shadow {
  position: absolute;
  width: 36px; height: 10px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.7) 0%, transparent 70%);
  bottom: -6px; left: 0;
  border-radius: 50%;
  animation: shadowPulse 1.2s ease-in-out infinite;
}
@keyframes shadowPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(0.8); opacity: 0.5; }
}
.token-body {
  width: 36px; height: 36px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  background: radial-gradient(circle at 35% 25%,
    #ff80c0 0%, #ff2080 35%, #ff0080 60%, #8b0040 85%, #3a0018 100%);
  box-shadow:
    inset -5px -6px 10px rgba(0,0,0,0.6),
    inset 4px 4px 8px rgba(255,255,255,0.5),
    0 0 0 3px rgba(255,255,255,0.7),
    0 0 20px rgba(255,32,128,0.8);
  position: absolute;
  top: 0; left: 0;
  animation: tokenBob 1.2s ease-in-out infinite, tokenGlow 2s ease-in-out infinite;
}
@keyframes tokenGlow {
  0%, 100% { box-shadow: inset -5px -6px 10px rgba(0,0,0,0.6), inset 4px 4px 8px rgba(255,255,255,0.5), 0 0 0 3px rgba(255,255,255,0.7), 0 0 20px rgba(255,32,128,0.8); }
  50% { box-shadow: inset -5px -6px 10px rgba(0,0,0,0.6), inset 4px 4px 8px rgba(255,255,255,0.5), 0 0 0 3px rgba(255,255,255,0.7), 0 0 35px rgba(255,32,128,1); }
}
.token-highlight {
  position: absolute;
  width: 13px; height: 10px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.9) 0%, transparent 100%);
  top: 5px; left: 7px;
  border-radius: 50%;
}
.token-pin {
  position: absolute;
  width: 5px; height: 18px;
  background: linear-gradient(to bottom, #eee, #666, #333);
  bottom: -12px; left: 15.5px;
  border-radius: 2px;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.6);
}
@keyframes tokenBob {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
}

.token-trail {
  position: absolute;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,32,128,0.4), transparent);
  pointer-events: none;
  animation: trailFade 0.6s ease-out forwards;
  transform: translate(-18px, -36px);
}
@keyframes trailFade {
  0% { transform: translate(-18px,-36px) scale(1); opacity: 0.8; }
  100% { transform: translate(-18px,-36px) scale(2); opacity: 0; }
}

@keyframes tokenJump {
  0% { transform: translateY(0px) scale(1); }
  40% { transform: translateY(-22px) scale(1.15); }
  100% { transform: translateY(0px) scale(1); }
}
#player.jumping .token-body { animation: tokenJump 0.35s ease-out; }

/* ── PARTICLES ── */
.particle {
  position: absolute;
  pointer-events: none;
  z-index: 100;
  border-radius: 50%;
  animation: particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  15% { transform: translate(-6px, -4px); }
  30% { transform: translate(6px, -4px); }
  45% { transform: translate(-6px, 4px); }
  60% { transform: translate(6px, 4px); }
  75% { transform: translate(-4px, -2px); }
  90% { transform: translate(4px, -2px); }
}
.shake { animation: shake 0.5s ease; }

.snake-scale-pattern { pointer-events: none; }
</style>
</head>
<body>

<header>🐍 Snakes &amp; Ladders — ULTRA 3D 🎲</header>

<div id="main-container">
  <div id="side-panel">
    <div class="panel-section">
      <div class="panel-label">Level</div>
      <select id="levelSelect" onchange="changeLevel()">
        <option value="1">Level 1 · 1→50</option>
        <option value="2">Level 2 · 1→100</option>
        <option value="3">Level 3 · 1→150</option>
        <option value="4">Level 4 · 1→200</option>
        <option value="5">Level 5 · 1→250</option>
      </select>
    </div>

    <div class="panel-section">
      <div class="panel-label">Stats</div>
      <div class="info-row"><span>Position</span><span class="info-val" id="statPos">1</span></div>
      <div class="info-row" style="margin-top:3px"><span>Rolls</span><span class="info-val" id="statRolls">0</span></div>
      <div class="info-row" style="margin-top:3px"><span>Snakes</span><span class="info-val" id="statSnakes">0</span></div>
      <div class="info-row" style="margin-top:3px"><span>Ladders</span><span class="info-val" id="statLadders">0</span></div>
    </div>

    <div class="panel-section" style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px;">
      <div id="dice-scene">
        <div id="dice-cube">
          <div class="dice-face f1 face-1"><div class="dot"></div></div>
          <div class="dice-face f2 face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f3 face-2"><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f4 face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f5 face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="dice-face f6 face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      </div>
      <div id="message">Ready to roll!</div>
    </div>

    <div class="panel-section" style="display:flex;flex-direction:column;gap:8px;">
      <button id="rollBtn" class="btn" onclick="playTurn()">🎲 Roll Dice</button>
      <button class="btn btn-new" onclick="startNewGame()">↺ New Game</button>
    </div>
  </div>

  <div id="board-area">
    <div id="board-wrapper">
      <div id="board-surface">
        <div id="board"></div>
        <svg id="svg-layer"></svg>
        <div id="player-scene">
          <div id="player">
            <div class="token-body"></div>
            <div class="token-highlight"></div>
            <div class="token-pin"></div>
            <div class="token-shadow"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>Snakes &amp; Ladders 3D Ultra · Neon Edition</footer>

<script>
const levels = {
  1: { max: 50, rows: 5 },
  2: { max: 100, rows: 10 },
  3: { max: 150, rows: 15 },
  4: { max: 200, rows: 20 },
  5: { max: 250, rows: 25 }
};

const diceTransforms = {
  1: 'rotateX(0deg) rotateY(0deg)',
  2: 'rotateX(0deg) rotateY(-90deg)',
  3: 'rotateX(-90deg) rotateY(0deg)',
  4: 'rotateX(90deg) rotateY(0deg)',
  5: 'rotateX(0deg) rotateY(90deg)',
  6: 'rotateX(0deg) rotateY(180deg)'
};

const snakePalettes = [
  { body: '#22c55e', belly: '#86efac', dark: '#15803d', eye: '#fff', pupil: '#000', stripe: '#166534' },
  { body: '#ef4444', belly: '#fca5a5', dark: '#b91c1c', eye: '#fff', pupil: '#111', stripe: '#7f1d1d' },
  { body: '#f97316', belly: '#fed7aa', dark: '#c2410c', eye: '#fff', pupil: '#1a0000', stripe: '#7c2d12' },
  { body: '#8b5cf6', belly: '#ddd6fe', dark: '#6d28d9', eye: '#fff', pupil: '#000', stripe: '#4c1d95' },
  { body: '#06b6d4', belly: '#a5f3fc', dark: '#0e7490', eye: '#fff', pupil: '#000', stripe: '#164e63' },
  { body: '#eab308', belly: '#fef08a', dark: '#a16207', eye: '#c00', pupil: '#000', stripe: '#713f12' },
];

let currentLevel = 1;
let currentPos = 1;
let maxPos = 50;
let isAnimating = false;
let jumps = {};
let snakeColors = {};
let rolls = 0, snakes = 0, ladders = 0;

const AC = window.AudioContext || window.webkitAudioContext;
let actx;

function playTone(freq, type, duration, vol=0.08) {
  try {
    if (!actx) actx = new AC();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + duration);
  } catch(e) {}
}

function updateStats() {
  document.getElementById('statPos').innerText = currentPos;
  document.getElementById('statRolls').innerText = rolls;
  document.getElementById('statSnakes').innerText = snakes;
  document.getElementById('statLadders').innerText = ladders;
}

function generateJumps() {
  jumps = {};
  snakeColors = {};
  const numJumps = Math.floor(maxPos / 6);
  let paletteIdx = 0;

  for(let i = 0; i < numJumps; i++) {
    // Ladders
    let startL = Math.floor(Math.random() * (maxPos - 14)) + 3;
    let endL = startL + Math.floor(Math.random() * 18) + 8;
    if (endL < maxPos && !jumps[startL] && !Object.values(jumps).includes(startL) && startL > 1) {
      jumps[startL] = endL;
    }

    // Snakes
    let endS = Math.floor(Math.random() * (maxPos - 22)) + 2;
    let startS = endS + Math.floor(Math.random() * 18) + 10;
    if (startS < maxPos && !jumps[startS] && !Object.values(jumps).includes(startS) && endS > 1) {
      jumps[startS] = endS;
      snakeColors[startS] = snakePalettes[paletteIdx % snakePalettes.length];
      paletteIdx++;
    }
  }
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const cols = 10;
  const rows = levels[currentLevel].rows;

  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  let cellNum = maxPos;
  for(let r = 0; r < rows; r++) {
    let rowCells = [];
    for(let c = 0; c < cols; c++) {
      rowCells.push(cellNum--);
    }
    let rowFromBottom = rows - 1 - r;
    if (rowFromBottom % 2 === 0) rowCells.reverse();

    rowCells.forEach(num => {
      let div = document.createElement('div');
      div.className = 'cell';
      div.id = `cell-${num}`;
      if(num === 1) div.classList.add('start-cell');
      if(num === maxPos) div.classList.add('end-cell');
      div.innerText = num;
      board.appendChild(div);
    });
  }
  
  // Wait slightly to ensure layout is ready before drawing SVG
  setTimeout(() => {
    drawSVGs();
    updatePlayerPosition();
  }, 100);
}

function getCellCoords(num) {
  const cell = document.getElementById(`cell-${num}`);
  if (!cell) return { x: 0, y: 0 };
  const rect = cell.getBoundingClientRect();
  const boardRect = document.getElementById('board-surface').getBoundingClientRect();
  return {
    x: rect.left - boardRect.left + rect.width / 2,
    y: rect.top - boardRect.top + rect.height / 2
  };
}

function drawSVGs() {
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = '';
  
  for (let start in jumps) {
    const end = jumps[start];
    const sCoord = getCellCoords(start);
    const eCoord = getCellCoords(end);
    
    if (end > start) {
      // Draw Ladder
      drawLadder(svg, sCoord, eCoord);
    } else {
      // Draw Snake
      const color = snakeColors[start] || snakePalettes[0];
      drawSnake(svg, sCoord, eCoord, color);
    }
  }
}

function drawLadder(svg, start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const angle = Math.atan2(dy, dx);
  const perpX = Math.cos(angle + Math.PI/2) * 12;
  const perpY = Math.sin(angle + Math.PI/2) * 12;
  
  const line1 = `<line x1="${start.x - perpX}" y1="${start.y - perpY}" x2="${end.x - perpX}" y2="${end.y - perpY}" stroke="#00f5ff" stroke-width="4" filter="drop-shadow(0 0 5px #00f5ff)" />`;
  const line2 = `<line x1="${start.x + perpX}" y1="${start.y + perpY}" x2="${end.x + perpX}" y2="${end.y + perpY}" stroke="#00f5ff" stroke-width="4" filter="drop-shadow(0 0 5px #00f5ff)" />`;
  
  let rungs = '';
  const steps = 8;
  for (let i = 1; i < steps; i++) {
    const px = start.x + (dx * (i/steps));
    const py = start.y + (dy * (i/steps));
    rungs += `<line x1="${px - perpX}" y1="${py - perpY}" x2="${px + perpX}" y2="${py + perpY}" stroke="#ff00ff" stroke-width="3" filter="drop-shadow(0 0 3px #ff00ff)" />`;
  }
  
  svg.innerHTML += line1 + line2 + rungs;
}

function drawSnake(svg, start, end, palette) {
  const midX = (start.x + end.x) / 2 + (Math.random() * 80 - 40);
  const midY = (start.y + end.y) / 2 + (Math.random() * 80 - 40);
  
  // Body
  const path = `<path d="M ${start.x} ${start.y} Q ${midX} ${midY} ${end.x} ${end.y}" stroke="${palette.body}" stroke-width="14" fill="none" stroke-linecap="round" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.6))"/>`;
  // Inner belly line
  const belly = `<path d="M ${start.x} ${start.y} Q ${midX} ${midY} ${end.x} ${end.y}" stroke="${palette.belly}" stroke-width="4" fill="none" stroke-linecap="round" />`;
  
  svg.innerHTML += path + belly;
}

function updatePlayerPosition() {
  const coord = getCellCoords(currentPos);
  const player = document.getElementById('player');
  player.style.left = `${coord.x}px`;
  player.style.top = `${coord.y}px`;
}

function changeLevel() {
  const sel = document.getElementById('levelSelect');
  currentLevel = sel.value;
  maxPos = levels[currentLevel].max;
  startNewGame();
}

function startNewGame() {
  currentPos = 1;
  rolls = 0;
  snakes = 0;
  ladders = 0;
  isAnimating = false;
  
  document.getElementById('message').innerText = "Ready to roll!";
  document.getElementById('rollBtn').disabled = false;
  
  updateStats();
  generateJumps();
  renderBoard();
}

async function playTurn() {
  if (isAnimating || currentPos >= maxPos) return;
  isAnimating = true;
  
  const btn = document.getElementById('rollBtn');
  btn.disabled = true;
  
  rolls++;
  updateStats();
  
  // Roll Dice Logic
  const roll = Math.floor(Math.random() * 6) + 1;
  const cube = document.getElementById('dice-cube');
  
  cube.style.setProperty('--final-transform', diceTransforms[roll]);
  cube.classList.remove('rolling');
  void cube.offsetWidth; // Trigger reflow
  cube.classList.add('rolling');
  
  playTone(600, 'sine', 0.1);
  document.getElementById('message').innerText = "Rolling...";
  
  // Wait for 3D animation
  await new Promise(r => setTimeout(r, 800)); 
  
  document.getElementById('message').innerText = `Rolled a ${roll}!`;
  playTone(800, 'square', 0.15);
  
  let nextPos = currentPos + roll;
  if (nextPos > maxPos) {
    nextPos = maxPos; // Cap at max position to win
  }
  
  await movePlayerStepByStep(nextPos);
  
  // Check for Snakes or Ladders
  if (jumps[currentPos]) {
    const dest = jumps[currentPos];
    if (dest > currentPos) {
      document.getElementById('message').innerText = "Ladder! Going up! 🚀";
      ladders++;
      playTone(400, 'sine', 0.1);
      setTimeout(() => playTone(600, 'sine', 0.2), 150);
    } else {
      document.getElementById('message').innerText = "Snake! Oh no! 🐍";
      snakes++;
      playTone(300, 'sawtooth', 0.3);
    }
    
    updateStats();
    await new Promise(r => setTimeout(r, 600));
    
    currentPos = dest;
    updatePlayerPosition();
    
    await new Promise(r => setTimeout(r, 400));
  }
  
  if (currentPos >= maxPos) {
    document.getElementById('message').innerText = "🎉 YOU WIN! 🎉";
    playTone(500, 'sine', 0.1);
    setTimeout(() => playTone(650, 'sine', 0.1), 100);
    setTimeout(() => playTone(800, 'sine', 0.3), 200);
  } else {
    btn.disabled = false;
  }
  
  isAnimating = false;
}

async function movePlayerStepByStep(target) {
  const player = document.getElementById('player');
  while (currentPos < target) {
    currentPos++;
    updatePlayerPosition();
    
    player.classList.add('jumping');
    playTone(300 + (currentPos * 5), 'sine', 0.05);
    
    await new Promise(r => setTimeout(r, 380));
    player.classList.remove('jumping');
  }
  updateStats();
}

// Handle window resizing
window.addEventListener('resize', () => {
  renderBoard();
});

// Initialize first game
window.onload = startNewGame;
</script>
</body>
</html>
